<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel — Siamese Chaos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Patrick+Hand&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;overflow:hidden;height:100vh;width:100vw;font-family:'Quicksand',sans-serif;user-select:none}
canvas{display:block}

#hud{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:20}
#hud button{
  font-family:'Patrick Hand',cursive;font-size:13px;padding:5px 14px;
  background:rgba(30,28,25,.75);color:#e8e0d4;border:1px solid rgba(232,224,212,.25);
  cursor:pointer;transition:all .15s;backdrop-filter:blur(4px);border-radius:2px;
}
#hud button:hover{background:rgba(232,93,74,.7);border-color:#e85d4a}
#hud button:active{transform:scale(.95)}
#hud button.active{background:rgba(232,93,74,.6);border-color:#e85d4a}

#toolbox{
  position:fixed;bottom:56px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:20;
}
#toolbox button{
  font-family:'Patrick Hand',cursive;font-size:12px;padding:4px 12px;
  background:rgba(30,28,25,.7);color:#e8e0d4;border:1px solid rgba(232,224,212,.2);
  cursor:pointer;border-radius:2px;transition:all .15s;
}
#toolbox button:hover{background:rgba(100,80,60,.6)}
#toolbox button.sel{background:rgba(232,93,74,.5);border-color:#e85d4a}

#info{
  position:fixed;top:14px;left:14px;
  font-size:12px;color:rgba(232,224,212,.6);z-index:20;
  font-family:'Patrick Hand',cursive;line-height:1.6;
}

#prompt{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Patrick Hand',cursive;font-size:22px;color:#e8e0d4;
  z-index:30;text-align:center;pointer-events:none;
  text-shadow:0 2px 8px rgba(0,0,0,.5);transition:opacity .5s;line-height:1.5;
}

#notif{
  position:fixed;top:40%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:rgba(30,28,25,.85);color:#e8e0d4;padding:10px 22px;
  font-family:'Patrick Hand',cursive;font-size:17px;z-index:50;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);text-align:center;
  backdrop-filter:blur(6px);border:1px solid rgba(232,224,212,.15);
}
#notif.show{transform:translate(-50%,-50%) scale(1)}

#title{
  position:fixed;inset:0;background:#1e1c19;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
#title h1{font-family:'Patrick Hand',cursive;font-size:clamp(42px,9vw,76px);color:#e8e0d4;letter-spacing:-1px}
#title .sub{font-size:clamp(12px,2vw,15px);color:#888;letter-spacing:2px}
#title .cat-preview{font-size:50px;margin:8px 0}
#pbtn{
  font-family:'Patrick Hand',cursive;font-size:18px;padding:10px 36px;
  background:#e85d4a;color:#e8e0d4;border:none;cursor:pointer;transition:transform .1s;margin-top:6px;
}
#pbtn:hover{transform:scale(1.05)}
.keys{font-size:11px;color:#666;text-align:center;max-width:380px;line-height:1.8;margin-top:4px}

#crosshair{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:4px;height:4px;background:rgba(232,224,212,.35);border-radius:50%;
  z-index:15;pointer-events:none;display:none;
}

#hug-warn{
  position:fixed;top:20%;left:50%;transform:translateX(-50%);
  font-family:'Patrick Hand',cursive;font-size:28px;color:#e85d4a;
  z-index:25;pointer-events:none;opacity:0;transition:opacity .3s;
  text-shadow:0 2px 12px rgba(0,0,0,.6);
}

#escape-bar{
  position:fixed;top:28%;left:50%;transform:translateX(-50%);
  width:200px;height:10px;background:rgba(30,28,25,.6);border:1px solid rgba(232,224,212,.2);
  z-index:25;display:none;overflow:hidden;border-radius:1px;
}
#escape-fill{width:0%;height:100%;background:#e85d4a;transition:width .1s}
</style>
</head>
<body>

<div id="title">
  <h1>PIXEL</h1>
  <div class="sub">siamese chaos simulator</div>
  <div class="cat-preview">🐱</div>
  <button id="pbtn">play</button>
  <div class="keys">
    WASD move · SPACE jump · Q pee · F meow · E interact/push<br>
    V toggle 1st/3rd person · mouse look · scroll zoom<br>
    1-3 select tool · click use tool · TAB mash to escape hugs
  </div>
</div>

<div id="crosshair"></div>
<div id="hug-warn">OWNER INCOMING — MASH TAB TO ESCAPE!</div>
<div id="escape-bar"><div id="escape-fill"></div></div>

<div id="info">
  <div id="i-view">view: 3rd person</div>
  <div id="i-tool">tool: none</div>
  <div id="i-room">room: living room</div>
</div>

<div id="toolbox">
  <button onclick="selectTool(0)" id="tb0">1: yarn bomb</button>
  <button onclick="selectTool(1)" id="tb1">2: banana peel</button>
  <button onclick="selectTool(2)" id="tb2">3: water balloon</button>
</div>

<div id="hud">
  <button onclick="doJump()">jump [space]</button>
  <button onclick="doPee()">pee [Q]</button>
  <button onclick="doMeow()">meow [F]</button>
  <button onclick="doInteract()">push [E]</button>
  <button onclick="toggleView()" id="vbtn">view [V]</button>
</div>

<div id="prompt"></div>
<div id="notif"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── AUDIO ───
const AC=new(window.AudioContext||window.webkitAudioContext)();
function ra(){if(AC.state==='suspended')AC.resume()}

function playMeow(){
  ra();
  // Realistic-ish cat meow using formant synthesis
  const dur=.45+Math.random()*.2;
  const t=AC.currentTime;
  // Main vocal
  const o1=AC.createOscillator(),g1=AC.createGain(),f1=AC.createBiquadFilter();
  o1.type='sawtooth';
  o1.frequency.setValueAtTime(340+Math.random()*60,t);
  o1.frequency.linearRampToValueAtTime(520+Math.random()*80,t+dur*.3);
  o1.frequency.linearRampToValueAtTime(380+Math.random()*40,t+dur*.7);
  o1.frequency.linearRampToValueAtTime(280+Math.random()*30,t+dur);
  f1.type='bandpass';f1.frequency.value=800;f1.Q.value=3;
  g1.gain.setValueAtTime(0,t);
  g1.gain.linearRampToValueAtTime(.18,t+.03);
  g1.gain.setValueAtTime(.18,t+dur*.6);
  g1.gain.linearRampToValueAtTime(0,t+dur);
  o1.connect(f1);f1.connect(g1);g1.connect(AC.destination);
  o1.start(t);o1.stop(t+dur);
  // Nasal harmonic
  const o2=AC.createOscillator(),g2=AC.createGain(),f2=AC.createBiquadFilter();
  o2.type='triangle';
  o2.frequency.setValueAtTime(680+Math.random()*80,t);
  o2.frequency.linearRampToValueAtTime(1040+Math.random()*100,t+dur*.3);
  o2.frequency.linearRampToValueAtTime(760,t+dur);
  f2.type='bandpass';f2.frequency.value=1200;f2.Q.value=4;
  g2.gain.setValueAtTime(0,t);
  g2.gain.linearRampToValueAtTime(.08,t+.04);
  g2.gain.linearRampToValueAtTime(0,t+dur);
  o2.connect(f2);f2.connect(g2);g2.connect(AC.destination);
  o2.start(t);o2.stop(t+dur);
  // Breathiness
  const buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const bd=buf.getChannelData(0);for(let i=0;i<bd.length;i++)bd[i]=(Math.random()*2-1);
  const ns=AC.createBufferSource(),nf=AC.createBiquadFilter(),ng=AC.createGain();
  ns.buffer=buf;nf.type='bandpass';nf.frequency.value=1500;nf.Q.value=2;
  ng.gain.setValueAtTime(0,t);ng.gain.linearRampToValueAtTime(.04,t+.05);ng.gain.linearRampToValueAtTime(0,t+dur);
  ns.connect(nf);nf.connect(ng);ng.connect(AC.destination);ns.start(t);
}

function playJump(){ra();const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.setValueAtTime(200,AC.currentTime);o.frequency.exponentialRampToValueAtTime(400,AC.currentTime+.08);g.gain.setValueAtTime(.1,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.1)}
function playLand(){ra();const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=80;g.gain.setValueAtTime(.15,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.1);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.1)}
function playPee(){ra();const b=AC.createBuffer(1,AC.sampleRate*.9,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.06*Math.sin(i/d.length*Math.PI);const s=AC.createBufferSource(),f=AC.createBiquadFilter();f.type='bandpass';f.frequency.value=2200;f.Q.value=6;s.buffer=b;s.connect(f);f.connect(AC.destination);s.start()}
function playCrash(){ra();const b=AC.createBuffer(1,AC.sampleRate*.15,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.25*(1-i/d.length);const s=AC.createBufferSource();s.buffer=b;s.connect(AC.destination);s.start();const o=AC.createOscillator(),g=AC.createGain();o.frequency.value=70;g.gain.setValueAtTime(.2,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.12);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.12)}
function playSplash(){ra();const b=AC.createBuffer(1,AC.sampleRate*.3,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.15*(1-i/d.length);const s=AC.createBufferSource(),f=AC.createBiquadFilter();f.type='highpass';f.frequency.value=800;s.buffer=b;s.connect(f);f.connect(AC.destination);s.start()}
function playOwnerGrunt(){ra();const o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(120,AC.currentTime);o.frequency.linearRampToValueAtTime(90,AC.currentTime+.4);g.gain.setValueAtTime(.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=300;o.connect(f);f.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+.4)}

// ─── THREE SETUP ───
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1e1c19);
scene.fog=new THREE.FogExp2(0x1e1c19,.018);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,100);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.prepend(renderer.domElement);
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

// Lights
scene.add(new THREE.AmbientLight(0xfff5e0,.35));
const sun=new THREE.DirectionalLight(0xfff0e0,.5);
sun.position.set(4,10,4);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.near=1;sun.shadow.camera.far=25;
sun.shadow.camera.left=-14;sun.shadow.camera.right=14;
sun.shadow.camera.top=14;sun.shadow.camera.bottom=-14;
scene.add(sun);
const pl1=new THREE.PointLight(0xffe4c4,.35,14);pl1.position.set(0,3,0);scene.add(pl1);
const pl2=new THREE.PointLight(0xfff0d8,.25,10);pl2.position.set(-7,3,0);scene.add(pl2);
const pl3=new THREE.PointLight(0xe0d0f0,.25,10);pl3.position.set(7,3,0);scene.add(pl3);

// ─── MATERIALS ───
function mat(c,ops={}){return new THREE.MeshLambertMaterial({color:c,...ops})}
const M={
  floor:mat(0xc8bca0),tile:mat(0xd0d0c8),
  wall:mat(0xe0dace),wallA:mat(0xd8d0c0),
  wood:mat(0xb89868),woodDk:mat(0x8a6940),
  fab:mat(0x8098b0),fabR:mat(0xc88080),fabG:mat(0x80a880),
  white:mat(0xeee8e0),grey:mat(0x999999),black:mat(0x2a2a2a),
  // Siamese cat colors
  siamBody:mat(0xf0e8d4),   // cream
  siamPoint:mat(0x5c4033),   // dark brown points
  siamEye:mat(0x6090c0),     // blue eyes
  siamNose:mat(0xc08888),
  siamPupil:mat(0x1a1a2a),
  // Other
  fish:mat(0xe8a848),vase:mat(0xc8a0a0),
  book1:mat(0x6088a0),book2:mat(0xa06060),book3:mat(0x60a060),
  cup:mat(0xf0f0f0),
  pee:mat(0xd8c860,{transparent:true,opacity:.55}),
  rug:mat(0xb89878),rugB:mat(0x7888a0),
  counter:mat(0xd8d0c0),
  mirror:mat(0xc0c8d0),
  human:mat(0xd8b090),humanShirt:mat(0x607090),humanPants:mat(0x505868),
  trap:mat(0xe8d848),balloon:mat(0x5888d0),yarn:mat(0xd86888),
  banana:mat(0xe8d040),
};

// ─── HELPERS ───
function bx(w,h,d,m){const g=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);g.castShadow=true;g.receiveShadow=true;return g}
function cy(r,h,m,s=16){const g=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,s),m);g.castShadow=true;g.receiveShadow=true;return g}
function sp(r,m,ws=12,hs=8){const g=new THREE.Mesh(new THREE.SphereGeometry(r,ws,hs),m);g.castShadow=true;g.receiveShadow=true;return g}

// ─── BUILD HOUSE ───
// Floor
const flr=bx(24,.15,18,M.floor);flr.position.set(0,-.075,0);flr.receiveShadow=true;scene.add(flr);
// Bathroom floor
const bFlr=bx(7,.02,6,M.tile);bFlr.position.set(-8.5,.01,-5);scene.add(bFlr);

// Walls — stored for transparency
const walls=[];
function addWall(x,y,z,w,h,d,m=M.wall){const w2=bx(w,h,d,m.clone());w2.position.set(x,y,z);scene.add(w2);walls.push(w2);return w2}
const WH=3.2,WT=.18;
addWall(0,WH/2,-9,24,WH,WT);   // back
addWall(0,WH/2,9,24,WH,WT);    // front
addWall(-12,WH/2,0,WT,WH,18);  // left
addWall(12,WH/2,0,WT,WH,18);   // right
// Inner dividers (with door gaps z=0..2.2)
addWall(-4,WH/2,-4.5,WT,WH,9,M.wallA);
addWall(-4,WH/2,3.6,WT,WH,2.8,M.wallA);
addWall(-4,2.6,1.1,WT,1.2,2.2,M.wallA);
addWall(4,WH/2,-4.5,WT,WH,9,M.wallA);
addWall(4,WH/2,3.6,WT,WH,2.8,M.wallA);
addWall(4,2.6,1.1,WT,1.2,2.2,M.wallA);
// Bathroom divider
addWall(-8.5,WH/2,-2,7,WH,WT,M.wallA);
addWall(-5.3,2.6,-2,1.5,1.2,WT,M.wallA);

// Ceiling
const ceil=bx(24,.1,18,M.wall);ceil.position.set(0,WH+.05,0);scene.add(ceil);walls.push(ceil);

// Rugs
const rug1=bx(5,.03,4,M.rug);rug1.position.set(0,.015,3);scene.add(rug1);
const rug2=bx(4,.03,3.5,M.rugB);rug2.position.set(8,.015,0);scene.add(rug2);

// ─── PHYSICS OBJECTS ───
const objs=[];  // {mesh, x,z,y, hw,hd, vx,vz,vy, mass, type, surfaceH, name, pushable}
let objId=0;

function addObj(mesh,x,y,z,hw,hd,type,extra={}){
  mesh.position.set(x,y,z);scene.add(mesh);
  const o={mesh,x,z,y,hw,hd,hh:mesh.geometry?.parameters?.height/2||.2,
    vx:0,vz:0,vy:0,mass:extra.mass||1,type,name:extra.name||'obj',
    pushable:extra.pushable!==false,surfaceH:extra.surfaceH||0,
    id:objId++,...extra};
  objs.push(o);return o;
}

// ── LIVING ROOM ──
// Couch
const couchG=new THREE.Group();
couchG.add(bx(3.2,.55,1,M.fab));couchG.children[0].position.y=.28;
couchG.add(bx(3.2,.75,.15,M.fab));couchG.children[1].position.set(0,.55,-.45);
couchG.add(bx(.15,.45,1,M.fab));couchG.children[2].position.set(-1.6,.4,0);
couchG.add(bx(.15,.45,1,M.fab));couchG.children[3].position.set(1.6,.4,0);
addObj(couchG,0,.0,5.5,1.75,.65,'surface',{surfaceH:.55,name:'couch',pushable:false,mass:50});

// Coffee table
const ctG=new THREE.Group();
ctG.add(bx(1.8,.07,1,M.wood));ctG.children[0].position.y=.035;
[[-0.7,0,-.35],[.7,0,-.35],[-.7,0,.35],[.7,0,.35]].forEach(p=>{const l=bx(.05,.35,.05,M.woodDk);l.position.set(...p);ctG.add(l)});
addObj(ctG,0,.35,3.2,1,.6,'surface',{surfaceH:.38,name:'coffee table',mass:8});

// Vase on table
addObj(cy(.12,.28,M.vase),-.5,.56,3.2,.15,.15,'item',{surfaceH:0,name:'vase',mass:.3});
// Cup
addObj(cy(.07,.14,M.cup),.4,.45,3.2,.1,.1,'item',{name:'cup',mass:.2});

// TV stand
addObj(bx(2.2,.45,.55,M.woodDk),0,.225,-1.5,1.2,.35,'surface',{surfaceH:.45,name:'tv stand',pushable:false,mass:30});
const tv=bx(1.8,1.1,.06,M.black);tv.position.set(0,1,.05);
tv.position.set(0,1.0,-1.7);
scene.add(tv);

// ── KITCHEN ──
addObj(bx(4.5,.85,.8,M.counter),-8,.425,-7.8,2.4,.5,'surface',{surfaceH:.85,name:'counter',pushable:false,mass:80});
addObj(cy(.15,.12,M.fish),-7,.92,-7.8,.15,.15,'item',{name:'fish1',mass:.1});
addObj(cy(.15,.12,M.fish),-7.8,.92,-7.8,.15,.15,'item',{name:'fish2',mass:.1});
addObj(cy(.15,.12,M.fish),-8.6,.92,-7.8,.15,.15,'item',{name:'fish3',mass:.1});
// Table
addObj(bx(1.6,.06,1.4,M.wood),-7,.68,-4.5,.9,.8,'surface',{surfaceH:.71,name:'kitchen table',mass:12});
addObj(cy(.07,.13,M.cup),-6.5,.78,-4.5,.1,.1,'item',{name:'mug',mass:.2});
// Fridge
addObj(bx(.8,2,.65,M.white),-11.4,1,-7.5,.5,.4,'surface',{surfaceH:2,name:'fridge',pushable:false,mass:100});

// ── BEDROOM ──
const bedG=new THREE.Group();
bedG.add(bx(2.6,.32,3.5,M.fabR));bedG.children[0].position.y=.16;
bedG.add(bx(2.6,.55,.18,M.woodDk));bedG.children[1].position.set(0,.28,-1.7);
addObj(bedG,8,.0,-2.5,1.45,1.9,'surface',{surfaceH:.35,name:'bed',pushable:false,mass:60});

addObj(bx(.6,.48,.5,M.wood),5.8,.24,-4,.4,.35,'surface',{surfaceH:.48,name:'nightstand',mass:6});
addObj(bx(.28,.06,.18,M.book1),5.8,.52,-4,.18,.12,'item',{name:'blue book',mass:.3});
addObj(bx(1.6,1.8,.4,M.woodDk),11.4,.9,2,.9,.3,'surface',{surfaceH:1.8,name:'bookshelf',pushable:false,mass:50});
addObj(bx(.2,.25,.15,M.book2),11.2,.5,2,.12,.1,'item',{name:'red book',mass:.2});
addObj(bx(.2,.25,.15,M.book3),11.4,.8,2,.12,.1,'item',{name:'green book',mass:.2});
// Desk
addObj(bx(2,.06,1,M.wood),8,.68,6,1.1,.6,'surface',{surfaceH:.71,name:'desk',mass:15});

// ── BATHROOM ──
const toiletG=new THREE.Group();
toiletG.add(bx(.5,.38,.5,M.white));toiletG.children[0].position.y=.19;
toiletG.add(bx(.5,.55,.08,M.white));toiletG.children[1].position.set(0,.47,-.24);
addObj(toiletG,-10,.0,-6,.35,.35,'surface',{surfaceH:.38,name:'toilet',pushable:false,mass:30});

addObj(bx(2,.48,.8,M.white),-7,.24,-7.5,1.1,.5,'surface',{surfaceH:.48,name:'bathtub',pushable:false,mass:50});

// ── MIRROR (in bathroom) ──
const mirrorGeo=new THREE.PlaneGeometry(1.2,1.6);
const mirrorRT=new THREE.WebGLRenderTarget(256,320);
const mirrorMat=new THREE.MeshBasicMaterial({map:mirrorRT.texture});
const mirrorMesh=new THREE.Mesh(mirrorGeo,mirrorMat);
mirrorMesh.position.set(-11.88,1.6,-5);mirrorMesh.rotation.y=Math.PI/2;
scene.add(mirrorMesh);
// Mirror frame
const mf=bx(1.35,1.75,.06,M.woodDk);mf.position.set(-11.9,1.6,-5);mf.rotation.y=0;scene.add(mf);
const mirrorCam=new THREE.PerspectiveCamera(50,256/320,.1,20);

// ─── SIAMESE CAT ───
const catG=new THREE.Group();
// Body - cream
catG.add(bx(.48,.32,.7,M.siamBody));catG.children[0].position.y=.38;
// Head - cream with dark face mask
catG.add(bx(.38,.32,.38,M.siamBody));catG.children[1].position.set(0,.68,.28);
// Dark face mask (front of head)
catG.add(bx(.3,.22,.04,M.siamPoint));catG.children[2].position.set(0,.65,.48);
// Ears - dark brown points

// ─── ACTIONS ───
function doJump(){
  if(!P.grounded||P.peeing||P.napping||beingHugged)return;
  P.vy=5.8;P.grounded=false;playJump();
}

function doPee(){
  if(P.peeing||P.napping||beingHugged||!P.grounded)return;
  P.peeing=true;P.peeT=0;playPee();
  // Create puddle at correct height
  let pH=P.y+.02;
  const puddle=cy(.25,.015,M.pee);
  puddle.position.set(P.x+Math.sin(P.rot)*.3,pH,P.z+Math.cos(P.rot)*.3);
  scene.add(puddle);
  P.chaos+=2;
  // Intro check
  if(introPhase===0){
    const d=Math.hypot(P.x-owner.x,P.z-owner.z);
    if(d<3){introPhase=1;introTimer=0;setPrompt('owner: PIXEL!! WHAT THE—!?');
      playOwnerGrunt();owner.state='shocked';P.chaos+=10;
      setTimeout(()=>{introPhase=2;setPrompt('');owner.state='chasing';owner.sitting=false},3000);
    }
  }
}

function doMeow(){
  if(P.napping||beingHugged)return;
  playMeow();P.meows++;P.chaos++;
  textParticles.push({x:innerWidth/2+(Math.random()-.5)*80,y:innerHeight*.45,
    vx:(Math.random()-.5)*100,vy:-50-Math.random()*60,life:1.5,
    t:['meow!','MEOW!!','mrow!','mrrp~','REOW!','nya!'][Math.floor(Math.random()*6)]});
}

function doInteract(){
  if(P.napping||beingHugged)return;
  // Push nearest object
  let nearest=null,nd=Infinity;
  objs.forEach(o=>{
    if(!o.pushable)return;
    const d=Math.hypot(P.x-o.x,P.z-o.z);
    if(d<2&&d<nd){nd=d;nearest=o}
  });
  if(nearest){
    const angle=Math.atan2(nearest.x-P.x,nearest.z-P.z);
    const force=4/Math.max(.5,nearest.mass);
    nearest.vx+=Math.sin(angle)*force;
    nearest.vz+=Math.cos(angle)*force;
    if(nearest.mass<1){playCrash();P.chaos+=2;
      nearest.vy=3+Math.random()*2;
      textParticles.push({x:innerWidth/2,y:innerHeight*.4,vx:0,vy:-40,life:1.2,t:'*CRASH*'});}
    else{P.chaos++}
  }
}

  document.getElementById('crosshair').style.display=fpv?'block':'none';

function selectTool(i){
  curTool=curTool===i?-1:i;
  ['tb0','tb1','tb2'].forEach((id,j)=>document.getElementById(id).classList.toggle('sel',j===curTool));
  const names=['yarn bomb','banana peel','water balloon'];
  document.getElementById('i-tool').textContent='tool: '+(curTool>=0?names[curTool]:'none');
}

function useTool(){
  if(curTool<0)return;
  const tx=P.x+Math.sin(P.rot)*2;
  const tz=P.z+Math.cos(P.rot)*2;
  if(curTool===0){
    // Yarn bomb — explodes nearby items
    const yarn=sp(.2,M.yarn);yarn.position.set(tx,.3,tz);scene.add(yarn);
    traps.push({mesh:yarn,x:tx,z:tz,type:'yarn',timer:1.5,active:true});
    P.chaos+=3;playCrash();
    // Push nearby
    objs.forEach(o=>{
      const d=Math.hypot(o.x-tx,o.z-tz);
      if(d<3&&o.pushable){
        const a=Math.atan2(o.x-tx,o.z-tz);
        const f=5/(d+.5)/Math.max(.5,o.mass);
        o.vx+=Math.sin(a)*f;o.vz+=Math.cos(a)*f;o.vy=2+Math.random()*2;
      }
    });
  }else if(curTool===1){
    // Banana peel — trips owner
    const banana=bx(.3,.04,.15,M.banana);banana.position.set(tx,.02,tz);scene.add(banana);
    traps.push({mesh:banana,x:tx,z:tz,type:'banana',active:true});
    P.chaos++;
  }else if(curTool===2){
    // Water balloon
    const ball=sp(.15,M.balloon);ball.position.set(tx,.5,tz);scene.add(ball);
    traps.push({mesh:ball,x:tx,z:tz,type:'balloon',vy:3,vx:Math.sin(P.rot)*6,vz:Math.cos(P.rot)*6,active:true});
    P.chaos+=2;plasSplash?.();
  }
}

const raycaster=new THREE.Raycaster();
function updateWallTransparency(){
  const camPos=camera.position.clone();
  const catPos=new THREE.Vector3(P.x,P.y+.5,P.z);
  const dir=catPos.clone().sub(camPos).normalize();
  const dist=camPos.distanceTo(catPos);
  raycaster.set(camPos,dir);raycaster.far=dist;
  const hits=raycaster.intersectObjects(walls,true);
  // Reset all walls
  walls.forEach(w=>{if(w.material.opacity!==undefined){w.material.transparent=false;w.material.opacity=1}});
  // Make hit walls transparent
  hits.forEach(h=>{
    h.object.material.transparent=true;
    h.object.material.opacity=.12;
  });
}

// ─── OWNER AI ───
function updateOwner(dt){
  if(introPhase===0){
    // Sitting on couch
    ownerG.position.set(1,.0,5.5);
    ownerG.children[2].rotation.x=-.9;ownerG.children[3].rotation.x=-.9;
    ownerG.children[2].position.y=.6;ownerG.children[3].position.y=.6;
    ownerG.children[2].position.z=.4;ownerG.children[3].position.z=.4;
    return;
  }
  if(owner.state==='shocked'){
    // Stand up animation
    ownerG.children[2].rotation.x=0;ownerG.children[3].rotation.x=0;
    ownerG.children[2].position.y=.35;ownerG.children[3].position.y=.35;
    ownerG.children[2].position.z=0;ownerG.children[3].position.z=0;
    ownerG.position.y=0;
    return;
  }

  if(owner.stunned){
    owner.stunTimer-=dt;
    if(owner.stunTimer<=0){owner.stunned=false}
    // Wobble
    ownerG.rotation.z=Math.sin(Date.now()*.01)*.3;
    return;
  }
  ownerG.rotation.z=0;

  // Standing legs reset
  ownerG.children[2].rotation.x=0;ownerG.children[3].rotation.x=0;
  ownerG.children[2].position.y=.35;ownerG.children[3].position.y=.35;
  ownerG.children[2].position.z=0;ownerG.children[3].position.z=0;

  // Chase player
  const dx=P.x-owner.x;const dz=P.z-owner.z;
  const dist=Math.hypot(dx,dz);
  const angle=Math.atan2(dx,dz);
  owner.rot=angle;
  ownerG.rotation.y=angle;

  if(dist>owner.hugDist){
    owner.x+=Math.sin(angle)*owner.speed*dt;
    owner.z+=Math.cos(angle)*owner.speed*dt;
    // Wall collision for owner
    owner.x=Math.max(-11.5,Math.min(11.5,owner.x));
    owner.z=Math.max(-8.5,Math.min(8.5,owner.z));
    // Walk animation
    const wa=Math.sin(Date.now()*.008)*.15;
    ownerG.children[2].rotation.x=wa;ownerG.children[3].rotation.x=-wa;
    // Arms reaching
    ownerG.children[4].rotation.x=-.5;ownerG.children[5].rotation.x=-.5;
  }else if(!beingHugged){
    // Start hug!
    beingHugged=true;escapeProgress=0;
    document.getElementById('hug-warn').style.opacity=1;
    document.getElementById('escape-bar').style.display='block';
    playOwnerGrunt();
  }

  // Check traps
  traps.forEach(t=>{
    if(!t.active)return;
    const d=Math.hypot(owner.x-t.x,owner.z-t.z);
    if(d<1){
      if(t.type==='banana'){
        owner.stunned=true;owner.stunTimer=4;t.active=false;
        scene.remove(t.mesh);sNotif('owner slipped on banana!');P.chaos+=5;playCrash();
      }
      if(t.type==='balloon'&&t.active){
        owner.stunned=true;owner.stunTimer=3;t.active=false;
        scene.remove(t.mesh);sNotif('SPLASH! owner is soaked!');P.chaos+=4;plasSplash?.();
      }
    }
  });

  ownerG.position.set(owner.x,0,owner.z);
}

function updateHug(dt){
  if(!beingHugged)return;
  document.getElementById('escape-fill').style.width=escapeProgress+'%';
  if(escapeProgress>=100){
    beingHugged=false;
    document.getElementById('hug-warn').style.opacity=0;
    document.getElementById('escape-bar').style.display='none';
    // Fling cat away
    const a=P.rot+Math.PI;
    P.x+=Math.sin(a)*3;P.z+=Math.cos(a)*3;P.vy=4;P.grounded=false;
    owner.stunned=true;owner.stunTimer=3;
    sNotif('ESCAPED! owner stunned!');P.chaos+=5;playMeow();
  }else{
    // Lock player position near owner
    P.x+=(owner.x-P.x)*.1;P.z+=(owner.z-P.z)*.1;
    escapeProgress=Math.max(0,escapeProgress-dt*15);
  }
}

// ─── GAME LOOP ───
let lastT=0;
function loop(){
  requestAnimationFrame(loop);
  const now=performance.now();
  const dt=Math.min((now-lastT)/1000,.05);lastT=now;
  if(gs!=='play')return;

  // Timers
  if(P.napping){P.napT+=dt;if(P.napT>2.5)P.napping=false}
  if(P.peeing){P.peeT+=dt;if(P.peeT>1.2)P.peeing=false}
  if(nT>0){nT-=dt;if(nT<=0)document.getElementById('notif').classList.remove('show')}

  // ── MOVEMENT ──
  let mx=0,mz=0;
  if(!P.napping&&!P.peeing&&!beingHugged){
    if(ks['w']||ks['arrowup'])mz=-1;
    if(ks['s']||ks['arrowdown'])mz=1;
    if(ks['a']||ks['arrowleft'])mx=-1;
    if(ks['d']||ks['arrowright'])mx=1;
  }
  if(mx||mz){
    const angle=Math.atan2(mx,mz)+cam3.ax;
    const speed=P.speed*dt;
    const newX=P.x+Math.sin(angle)*speed;
    const newZ=P.z+Math.cos(angle)*speed;
    // Wall bounds
    let canX=newX>-11.5&&newX<11.5;
    let canZ=newZ>-8.5&&newZ<8.5;
    // Inner walls
    if(canX){
      if((P.x>=-3.8&&newX<-3.8)||(P.x<=-3.8&&newX>-3.8))
        if(P.z<0||P.z>2.2)canX=false;
      if((P.x>=3.8&&newX<3.8)||(P.x<=3.8&&newX>3.8))
        if(P.z<0||P.z>2.2)canX=false;
    }
    // Bathroom wall
    if(canZ&&P.x<-4){
      if((P.z>=-1.8&&newZ<-1.8)||(P.z<=-1.8&&newZ>-1.8))
        if(P.x<-6.2||P.x>-4.5)canZ=false;
    }
    // Furniture collision (only non-pushable, or heavy)
    objs.forEach(o=>{
      if(o.pushable&&o.mass<5)return; // light objects can be walked through/pushed
      const odx=Math.abs(newX-o.x);const odz=Math.abs(newZ-o.z);
      if(odx<o.hw+.25&&odz<o.hd+.25){
        if(Math.abs(P.x-o.x)>=o.hw+.2)canX=false;
        if(Math.abs(P.z-o.z)>=o.hd+.2)canZ=false;
      }
    });
    if(canX)P.x=newX;
    if(canZ)P.z=newZ;
    P.rot=angle;
  }

  // ── GRAVITY ──
  let floorY=0;P.onSurface=null;
  objs.forEach(o=>{
    if(!o.surfaceH)return;
    if(Math.abs(P.x-o.x)<o.hw+.1&&Math.abs(P.z-o.z)<o.hd+.1){
      if(P.y>=o.y+o.surfaceH-.15&&P.y<=o.y+o.surfaceH+.6){
        const sh=o.y+o.surfaceH;
        if(sh>floorY){floorY=sh;P.onSurface=o}
      }
    }
  });
  P.vy-=16*dt;P.y+=P.vy*dt;
  if(P.y<=floorY){
    if(!P.grounded&&P.vy<-2)playLand();
    P.y=floorY;P.vy=0;P.grounded=true;
  }else P.grounded=false;

  // ── PHYSICS OBJECTS ──
  objs.forEach(o=>{
    if(!o.pushable)return;
    // Apply velocity
    o.x+=o.vx*dt;o.z+=o.vz*dt;o.y+=o.vy*dt;
    // Gravity
    o.vy-=12*dt;
    // Floor
    let oFloor=0;
    // Check if on another surface
    objs.forEach(o2=>{
      if(o2===o||!o2.surfaceH)return;
      if(Math.abs(o.x-o2.x)<o2.hw&&Math.abs(o.z-o2.z)<o2.hd){
        const sh=o2.y+o2.surfaceH;
        if(o.y>=sh-.2&&o.y<=sh+.5)if(sh>oFloor)oFloor=sh;
      }
    });
    if(o.y<oFloor){o.y=oFloor;o.vy*=-.2;o.vx*=.6;o.vz*=.6}
    // Wall bounds
    o.x=Math.max(-11.5,Math.min(11.5,o.x));
    o.z=Math.max(-8.5,Math.min(8.5,o.z));
    // Friction
    o.vx*=Math.pow(.1,dt);o.vz*=Math.pow(.1,dt);
    // Update mesh
    o.mesh.position.set(o.x,o.y,o.z);
  });

  // ── TRAPS UPDATE ──
  traps.forEach(t=>{
    if(t.type==='yarn'&&t.active){
      t.timer-=dt;if(t.timer<=0){t.active=false;scene.remove(t.mesh)}
    }
    if(t.type==='balloon'&&t.active){
      t.x+=(t.vx||0)*dt;t.z+=(t.vz||0)*dt;
      t.vy=(t.vy||0)-8*dt;
      t.mesh.position.set(t.x,(t.mesh.position.y||.5)+(t.vy||0)*dt,t.z);
      if(t.mesh.position.y<.1){t.active=false;scene.remove(t.mesh);plasSplash?.()}
    }
  });

  // ── OWNER AI ──
  updateOwner(dt);
  updateHug(dt);

  // ── UPDATE CAT VISUAL ──
  catG.position.set(P.x,P.y,P.z);
  catG.rotation.y=P.rot;
  // Walk animation
  if(mx||mz){
    const wa=Math.sin(now*.012)*.12;
    catG.children.slice(11,15).forEach((l,i)=>{l.rotation.x=wa*(i%2?1:-1)});
    catG.children.slice(15).forEach((l,i)=>{l.position.y=.18+Math.abs(Math.sin(now*.012+i)*.04)});
  }
  // Tail wag
  tailG.rotation.z=Math.sin(now*.005)*.35;

  // Pee visual on cat
  if(P.peeing){
    catG.children.slice(15,17).forEach(l=>{l.rotation.x=-.3});
  }

  // ── CAMERA ──
  if(fpv){
    camera.position.set(P.x,P.y+.7,P.z);
    camera.rotation.order='YXZ';
    camera.rotation.y=cam3.ax;
    camera.rotation.x=-cam3.ay+.7;
  }else{
    const cx=P.x+Math.sin(cam3.ax)*cam3.dist*Math.cos(cam3.ay);
    const cy2=P.y+cam3.dist*Math.sin(cam3.ay)+1.2;
    const cz=P.z+Math.cos(cam3.ax)*cam3.dist*Math.cos(cam3.ay);
    camera.position.lerp(new THREE.Vector3(cx,cy2,cz),.1);
    camera.lookAt(P.x,P.y+.5,P.z);
  }

  // ── WALL TRANSPARENCY ──
  if(!fpv)updateWallTransparency();

  // ── MIRROR ──
  if(fpv){
    const md=Math.hypot(P.x-(-11.88),P.z-(-5));
    if(md<5){
      catG.visible=true;
      updateMirror();
      catG.visible=false;
    }
  }else{
    // Update mirror less frequently
    if(Math.floor(now/200)%3===0)updateMirror();
  }

  // Room label
  document.getElementById('i-room').textContent='room: '+getRoomLabel();

  // Intro prompts
  if(introPhase===0&&gs==='play'){
    introTimer+=dt;
    if(introTimer>8)setPrompt('walk to the couch... press Q to pee...');
  }

  renderer.render(scene,camera);
  drawOverlay(dt);
}

// polyfill
function plasSplash(){playSplash()}
</script>
</body>
</html>
