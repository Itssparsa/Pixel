<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL — A Stray Cat's Journey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  overflow: hidden;
  background: #000;
  font-family: 'Share Tech Mono', monospace;
  cursor: none;
  user-select: none;
}

#game-canvas { display: block; width: 100vw; height: 100vh; }

/* Custom Cursor */
#cursor {
  position: fixed;
  width: 24px; height: 24px;
  pointer-events: none;
  z-index: 10000;
  transform: translate(-50%, -50%);
}
#cursor::before, #cursor::after {
  content: '';
  position: absolute;
}
#cursor::before {
  width: 2px; height: 24px;
  left: 11px; top: 0;
  background: rgba(0, 255, 200, 0.8);
}
#cursor::after {
  width: 24px; height: 2px;
  top: 11px; left: 0;
  background: rgba(0, 255, 200, 0.8);
}

/* Loading Screen */
#loading-screen {
  position: fixed;
  inset: 0;
  background: #0a0a0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 1s ease;
}
#loading-screen.hidden { opacity: 0; pointer-events: none; }

.loading-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 72px;
  font-weight: 900;
  background: linear-gradient(135deg, #00ffc8, #ff006e, #00b4d8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 12px;
  margin-bottom: 8px;
  animation: glitch 3s infinite;
}

.loading-subtitle {
  font-size: 16px;
  color: #00ffc8;
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 60px;
  opacity: 0.7;
}

.loading-bar-container {
  width: 400px;
  height: 3px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 20px;
}
.loading-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00ffc8, #ff006e);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.loading-text {
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 4px;
}

.loading-cat {
  margin-bottom: 40px;
  animation: catWalk 2s ease-in-out infinite;
}
.loading-cat svg { width: 80px; height: 60px; }

@keyframes catWalk {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes glitch {
  0%, 90%, 100% { transform: translate(0); }
  92% { transform: translate(-2px, 1px); }
  94% { transform: translate(2px, -1px); }
  96% { transform: translate(-1px, -1px); }
  98% { transform: translate(1px, 2px); }
}

/* Title Screen */
#title-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 100%);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9998;
  cursor: pointer;
}
#title-screen.show { display: flex; }

.title-main {
  font-family: 'Orbitron', sans-serif;
  font-size: 120px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 60px rgba(0,255,200,0.5), 0 0 120px rgba(255,0,110,0.3);
  letter-spacing: 20px;
  margin-bottom: 10px;
}
.title-tagline {
  font-size: 18px;
  color: #00ffc8;
  letter-spacing: 12px;
  text-transform: uppercase;
  margin-bottom: 80px;
}
.title-start {
  font-size: 16px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 6px;
  text-transform: uppercase;
  animation: pulse 2s ease-in-out infinite;
}
.title-controls {
  position: absolute;
  bottom: 60px;
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 3px;
  text-align: center;
  line-height: 2;
}
.title-controls span { color: #00ffc8; }

@keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

/* HUD */
#hud {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  display: none;
}
#hud.show { display: block; }

.hud-top {
  position: absolute;
  top: 30px;
  left: 30px;
  right: 30px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.hud-cat-info {
  display: flex;
  align-items: center;
  gap: 15px;
}
.hud-cat-icon {
  width: 50px; height: 50px;
  border: 2px solid #00ffc8;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: rgba(0,255,200,0.1);
}
.hud-cat-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  color: #00ffc8;
  letter-spacing: 4px;
}
.hud-cat-status {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
  margin-top: 4px;
}

.hud-collectibles {
  display: flex;
  gap: 20px;
  align-items: center;
}
.hud-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
}
.hud-item-icon {
  width: 28px; height: 28px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  background: rgba(255,255,255,0.05);
}

.hud-bottom {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
}

.hud-interact {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 3px;
  padding: 10px 30px;
  border: 1px solid rgba(0,255,200,0.3);
  border-radius: 30px;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  display: none;
}
.hud-interact.show { display: block; }

.hud-objective {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  padding: 8px 24px;
  background: rgba(0,0,0,0.4);
  border-radius: 20px;
  backdrop-filter: blur(5px);
}

.hud-meow {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  color: #ff006e;
  opacity: 0;
  transition: opacity 0.3s;
  font-family: 'Orbitron', sans-serif;
}
.hud-meow.show { opacity: 1; }

/* Minimap */
.hud-minimap {
  position: absolute;
  bottom: 30px;
  right: 30px;
  width: 150px;
  height: 150px;
  border: 1px solid rgba(0,255,200,0.3);
  border-radius: 12px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  overflow: hidden;
}
.minimap-canvas { width: 100%; height: 100%; }

/* Dialog */
#dialog-box {
  position: fixed;
  bottom: 120px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  padding: 24px 30px;
  background: rgba(10,10,30,0.9);
  border: 1px solid rgba(0,255,200,0.3);
  border-radius: 12px;
  backdrop-filter: blur(20px);
  z-index: 200;
  display: none;
  pointer-events: auto;
}
#dialog-box.show { display: block; }
.dialog-speaker {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  color: #00ffc8;
  letter-spacing: 3px;
  margin-bottom: 10px;
}
.dialog-text {
  font-size: 14px;
  color: rgba(255,255,255,0.8);
  line-height: 1.8;
  letter-spacing: 1px;
}
.dialog-continue {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  text-align: right;
  margin-top: 12px;
  letter-spacing: 2px;
}

/* Photo mode overlay */
#photo-mode {
  position: fixed;
  inset: 0;
  border: 3px solid rgba(255,255,255,0.2);
  z-index: 150;
  display: none;
  pointer-events: none;
}
#photo-mode.show { display: block; }
#photo-mode::before {
  content: 'PHOTO MODE';
  position: absolute;
  top: 20px;
  right: 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 4px;
}

/* Scanlines */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 99;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 98;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
}
</style>
</head>
<body>

<!-- Custom Cursor -->
<div id="cursor"></div>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-cat">
    <svg viewBox="0 0 80 60" fill="none">
      <path d="M15 25 L20 10 L28 22" stroke="#00ffc8" stroke-width="2" fill="rgba(0,255,200,0.1)"/>
      <path d="M52 22 L60 10 L65 25" stroke="#00ffc8" stroke-width="2" fill="rgba(0,255,200,0.1)"/>
      <ellipse cx="40" cy="35" rx="25" ry="18" stroke="#00ffc8" stroke-width="2" fill="rgba(0,255,200,0.05)"/>
      <circle cx="32" cy="30" r="3" fill="#00ffc8"/>
      <circle cx="48" cy="30" r="3" fill="#00ffc8"/>
      <path d="M38 35 L40 37 L42 35" stroke="#ff006e" stroke-width="2"/>
      <path d="M65 38 Q75 35 78 42" stroke="#00ffc8" stroke-width="2"/>
    </svg>
  </div>
  <div class="loading-title">PIXEL</div>
  <div class="loading-subtitle">A Stray Cat's Journey</div>
  <div class="loading-bar-container">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
  <div class="loading-text" id="loading-text">INITIALIZING WORLD...</div>
</div>

<!-- Title Screen -->
<div id="title-screen">
  <div class="title-main">PIXEL</div>
  <div class="title-tagline">A Stray Cat's Journey</div>
  <div class="title-start">CLICK TO BEGIN</div>
  <div class="title-controls">
    <span>WASD</span> MOVE &nbsp;&nbsp; <span>SPACE</span> JUMP &nbsp;&nbsp; <span>SHIFT</span> SPRINT &nbsp;&nbsp; <span>E</span> INTERACT<br>
    <span>Q</span> MEOW &nbsp;&nbsp; <span>F</span> SCRATCH &nbsp;&nbsp; <span>MOUSE</span> LOOK &nbsp;&nbsp; <span>P</span> PHOTO MODE
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <div class="hud-cat-info">
      <div class="hud-cat-icon">🐱</div>
      <div>
        <div class="hud-cat-name">PIXEL</div>
        <div class="hud-cat-status" id="cat-status">EXPLORING</div>
      </div>
    </div>
    <div class="hud-collectibles">
      <div class="hud-item">
        <div class="hud-item-icon">💾</div>
        <span id="memories-count">0 / 8</span>
      </div>
      <div class="hud-item">
        <div class="hud-item-icon">🐟</div>
        <span id="fish-count">0</span>
      </div>
      <div class="hud-item">
        <div class="hud-item-icon">⚡</div>
        <span id="energy-count">0</span>
      </div>
    </div>
  </div>

  <div class="hud-objective" id="objective">EXPLORE THE NEON DISTRICT</div>

  <div class="hud-meow" id="meow-text">Meow!</div>

  <div class="hud-bottom">
    <div class="hud-interact" id="interact-prompt">[E] INTERACT</div>
  </div>

  <div class="hud-minimap">
    <canvas class="minimap-canvas" id="minimap" width="150" height="150"></canvas>
  </div>
</div>

<!-- Dialog -->
<div id="dialog-box">
  <div class="dialog-speaker" id="dialog-speaker">ROBOT-B12</div>
  <div class="dialog-text" id="dialog-text"></div>
  <div class="dialog-continue">[E] CONTINUE</div>
</div>

<!-- Photo Mode -->
<div id="photo-mode"></div>

<!-- Overlays -->
<div class="scanlines"></div>
<div class="vignette"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================
// PIXEL — A Stray Cat's Journey
// A 3D adventure game inspired by Stray
// ============================================

const CONFIG = {
  GRAVITY: -25,
  JUMP_FORCE: 10,
  MOVE_SPEED: 8,
  SPRINT_SPEED: 14,
  MOUSE_SENSITIVITY: 0.002,
  CAT_HEIGHT: 0.6,
  WORLD_SIZE: 120,
  NEON_COLORS: [0x00ffc8, 0xff006e, 0x00b4d8, 0xffbe0b, 0x8338ec, 0xff5400],
};

// ============================================
// GAME STATE
// ============================================
const state = {
  loaded: false,
  playing: false,
  paused: false,
  photoMode: false,
  memories: 0,
  fish: 0,
  energy: 0,
  meowing: false,
  scratching: false,
  interactTarget: null,
  dialogActive: false,
  dialogQueue: [],
  objectives: [
    'EXPLORE THE NEON DISTRICT',
    'FIND THE LOST MEMORY CHIP',
    'TALK TO THE ROBOTS',
    'REACH THE UPPER CITY',
    'DISCOVER THE WAY OUT'
  ],
  currentObjective: 0,
  velocity: new THREE.Vector3(),
  onGround: false,
  canJump: true,
  moveForward: false,
  moveBackward: false,
  moveLeft: false,
  moveRight: false,
  sprint: false,
  jump: false,
  catAnimation: 0,
  tailAngle: 0,
  legPhase: 0,
  purring: false,
  npcTalked: new Set(),
};

// ============================================
// THREE.JS SETUP
// ============================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.012);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.insertBefore(renderer.domElement, document.body.firstChild);
renderer.domElement.id = 'game-canvas';

// ============================================
// AUDIO SYSTEM
// ============================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}

function playMeow() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.3);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.4);
}

function playJump() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.15);
}

function playCollect() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(523, audioCtx.currentTime);
  osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1);
  osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.4);
}

function playScratch() {
  if (!audioCtx) return;
  const bufferSize = audioCtx.sampleRate * 0.2;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.1;
  const source = audioCtx.createBufferSource();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 3000;
  source.buffer = buffer;
  source.connect(filter);
  filter.connect(audioCtx.destination);
  source.start();
}

function playPurr() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 25;
  lfoGain.gain.value = 10;
  lfo.connect(lfoGain);
  lfoGain.connect(osc.frequency);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.value = 50;
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
  lfo.start(audioCtx.currentTime);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 1.5);
  lfo.stop(audioCtx.currentTime + 1.5);
}

// ============================================
// LIGHTING
// ============================================
const ambientLight = new THREE.AmbientLight(0x1a1a3e, 0.4);
scene.add(ambientLight);

const moonLight = new THREE.DirectionalLight(0x4466aa, 0.3);
moonLight.position.set(50, 80, 30);
moonLight.castShadow = true;
moonLight.shadow.mapSize.width = 2048;
moonLight.shadow.mapSize.height = 2048;
moonLight.shadow.camera.near = 0.1;
moonLight.shadow.camera.far = 200;
moonLight.shadow.camera.left = -60;
moonLight.shadow.camera.right = 60;
moonLight.shadow.camera.top = 60;
moonLight.shadow.camera.bottom = -60;
scene.add(moonLight);

const hemiLight = new THREE.HemisphereLight(0x1a0a2e, 0x0a1a0a, 0.3);
scene.add(hemiLight);

// ============================================
// MATERIALS
// ============================================
const materials = {
  ground: new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9, metalness: 0.1 }),
  concrete: new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8, metalness: 0.1 }),
  darkMetal: new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.4, metalness: 0.8 }),
  rust: new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9, metalness: 0.3 }),
  glass: new THREE.MeshStandardMaterial({ color: 0x1a3a4a, roughness: 0.1, metalness: 0.9, transparent: true, opacity: 0.4 }),
  neonCyan: new THREE.MeshStandardMaterial({ color: 0x00ffc8, emissive: 0x00ffc8, emissiveIntensity: 2, roughness: 0.1 }),
  neonPink: new THREE.MeshStandardMaterial({ color: 0xff006e, emissive: 0xff006e, emissiveIntensity: 2, roughness: 0.1 }),
  neonBlue: new THREE.MeshStandardMaterial({ color: 0x00b4d8, emissive: 0x00b4d8, emissiveIntensity: 2, roughness: 0.1 }),
  neonYellow: new THREE.MeshStandardMaterial({ color: 0xffbe0b, emissive: 0xffbe0b, emissiveIntensity: 2, roughness: 0.1 }),
  neonPurple: new THREE.MeshStandardMaterial({ color: 0x8338ec, emissive: 0x8338ec, emissiveIntensity: 2, roughness: 0.1 }),
  wood: new THREE.MeshStandardMaterial({ color: 0x4a3520, roughness: 0.9, metalness: 0.0 }),
  catCream: new THREE.MeshStandardMaterial({ color: 0xf5e6d3, roughness: 0.7, metalness: 0.0 }),
  catDark: new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.6, metalness: 0.0 }),
  catEye: new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x2244aa, emissiveIntensity: 0.5, roughness: 0.1 }),
  robotBody: new THREE.MeshStandardMaterial({ color: 0x4a4a5a, roughness: 0.3, metalness: 0.9 }),
  robotEye: new THREE.MeshStandardMaterial({ color: 0x00ffc8, emissive: 0x00ffc8, emissiveIntensity: 3, roughness: 0.0 }),
  water: new THREE.MeshStandardMaterial({ color: 0x0a3a4a, roughness: 0.1, metalness: 0.6, transparent: true, opacity: 0.6 }),
  collectible: new THREE.MeshStandardMaterial({ color: 0xffbe0b, emissive: 0xffbe0b, emissiveIntensity: 1.5, roughness: 0.1 }),
};

// ============================================
// BUILD THE CAT (PIXEL)
// ============================================
const catGroup = new THREE.Group();
const catBody = new THREE.Group();

// Body
const torsoGeo = new THREE.BoxGeometry(0.5, 0.35, 0.8);
const torso = new THREE.Mesh(torsoGeo, materials.catCream);
torso.position.y = 0.35;
torso.castShadow = true;
catBody.add(torso);

function addCollider(mesh) {
  const box = new THREE.Box3().setFromObject(mesh);
  colliders.push({ mesh, box });
}

function createBuilding(x, z, w, d, h, neonColor) {
  const group = new THREE.Group();

  // Main structure
  const geo = new THREE.BoxGeometry(w, h, d);
  const building = new THREE.Mesh(geo, materials.concrete);
  building.position.set(x, h / 2, z);
  building.castShadow = true;
  building.receiveShadow = true;
  group.add(building);
  scene.add(group);
  addCollider(building);

  // Windows
  const windowMat = neonColor ? new THREE.MeshStandardMaterial({
    color: neonColor,
    emissive: neonColor,
    emissiveIntensity: 0.3,
    transparent: true,
    opacity: 0.6
  }) : materials.glass;

  const rows = Math.floor(h / 1.5);
  const cols = Math.floor(w / 2);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() > 0.4) {
        const winGeo = new THREE.PlaneGeometry(0.6, 0.8);
        const win = new THREE.Mesh(winGeo, Math.random() > 0.5 ? windowMat : materials.glass);
        const side = Math.random() > 0.5 ? 1 : -1;
        win.position.set(
          x + (c - cols / 2 + 0.5) * 1.8,
          1.5 + r * 1.5,
          z + (d / 2 + 0.01) * side
        );
        if (side < 0) win.rotation.y = Math.PI;
        group.add(win);
      }
    }
  }

  // Neon trim
  if (neonColor) {
    const neonMat = new THREE.MeshStandardMaterial({
      color: neonColor,
      emissive: neonColor,
      emissiveIntensity: 2
    });

    // Bottom trim
    const trimGeo = new THREE.BoxGeometry(w + 0.2, 0.08, 0.08);
    const trim = new THREE.Mesh(trimGeo, neonMat);
    trim.position.set(x, 0.5, z + d / 2 + 0.05);
    group.add(trim);

    // Top trim
    const trimTop = new THREE.Mesh(trimGeo, neonMat);
    trimTop.position.set(x, h, z + d / 2 + 0.05);
    group.add(trimTop);

    // Neon point light
    const light = new THREE.PointLight(neonColor, 2, 15);
    light.position.set(x, 2, z + d / 2 + 1);
    scene.add(light);
    neonLights.push({ light, baseIntensity: 2, phase: Math.random() * Math.PI * 2 });
  }

  return group;
}

function createNeonSign(x, y, z, color, rotY = 0) {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 3
  });

  // Sign backing
  const backGeo = new THREE.BoxGeometry(2.5, 0.8, 0.05);
  const backMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
  const back = new THREE.Mesh(backGeo, backMat);
  group.add(back);

  // Neon tubes (abstract shapes)
  for (let i = 0; i < 4; i++) {
    const tubeGeo = new THREE.BoxGeometry(0.4 + Math.random() * 0.3, 0.06, 0.06);
    const tube = new THREE.Mesh(tubeGeo, mat);
    tube.position.set(-0.8 + i * 0.5, (Math.random() - 0.5) * 0.3, 0.05);
    group.add(tube);
  }

  // Light
  const light = new THREE.PointLight(color, 3, 10);
  light.position.set(0, 0, 1);
  group.add(light);
  neonLights.push({ light, baseIntensity: 3, phase: Math.random() * Math.PI * 2 });

  group.position.set(x, y, z);
  group.rotation.y = rotY;
  scene.add(group);
  return group;
}

function createPipe(x1, y1, z1, x2, y2, z2, radius = 0.08) {
  const dir = new THREE.Vector3(x2 - x1, y2 - y1, z2 - z1);
  const len = dir.length();
  const geo = new THREE.CylinderGeometry(radius, radius, len, 8);
  const pipe = new THREE.Mesh(geo, materials.darkMetal);
  pipe.position.set((x1 + x2) / 2, (y1 + y2) / 2, (z1 + z2) / 2);
  pipe.lookAt(x2, y2, z2);
  pipe.rotateX(Math.PI / 2);
  scene.add(pipe);
  return pipe;
}

function createCollectible(x, y, z, type) {
  const group = new THREE.Group();
  let geo, mat;

  if (type === 'memory') {
    geo = new THREE.OctahedronGeometry(0.2, 0);
    mat = new THREE.MeshStandardMaterial({ color: 0x00ffc8, emissive: 0x00ffc8, emissiveIntensity: 2, roughness: 0.1 });
  } else if (type === 'fish') {
    geo = new THREE.ConeGeometry(0.1, 0.3, 6);
    mat = new THREE.MeshStandardMaterial({ color: 0xff9500, emissive: 0xff9500, emissiveIntensity: 1, roughness: 0.3 });
  } else {
    geo = new THREE.IcosahedronGeometry(0.15, 0);
    mat = new THREE.MeshStandardMaterial({ color: 0xffbe0b, emissive: 0xffbe0b, emissiveIntensity: 1.5, roughness: 0.1 });
  }

  const mesh = new THREE.Mesh(geo, mat);
  group.add(mesh);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.3, 0.35, 20);
  const ringMat = new THREE.MeshBasicMaterial({ color: mat.color, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  group.add(ring);

  // Light
  const light = new THREE.PointLight(mat.color.getHex(), 1, 5);
  group.add(light);

  group.position.set(x, y, z);
  group.userData = { type, collected: false };
  scene.add(group);
  collectibles.push(group);

  return group;
}

function createPlatform(x, y, z, w, d, moving = false, axis = 'y', range = 3, speed = 1) {
  const geo = new THREE.BoxGeometry(w, 0.2, d);
  const mat = new THREE.MeshStandardMaterial({ color: 0x3a3a5a, roughness: 0.5, metalness: 0.6 });
  const platform = new THREE.Mesh(geo, mat);
  platform.position.set(x, y, z);
  platform.receiveShadow = true;
  platform.castShadow = true;
  scene.add(platform);
  addCollider(platform);

  // Edge glow
  const edgeGeo = new THREE.BoxGeometry(w + 0.05, 0.02, d + 0.05);
  const edge = new THREE.Mesh(edgeGeo, materials.neonCyan);
  edge.position.set(x, y + 0.11, z);
  scene.add(edge);

  if (moving) {
    movingPlatforms.push({ mesh: platform, edge, origin: { x, y, z }, axis, range, speed, phase: Math.random() * Math.PI * 2 });
  }

  return platform;
}

  scene.add(fogPlane);
  particles.push(fogPlane);
}

// Rain effect
const rainGeo = new THREE.BufferGeometry();
const rainPositions = new Float32Array(2000 * 3);
for (let i = 0; i < 2000; i++) {
  rainPositions[i * 3] = (Math.random() - 0.5) * 80;
  rainPositions[i * 3 + 1] = Math.random() * 30;
  rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 80 - 20;
}
rainGeo.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));
const rainMat = new THREE.PointsMaterial({ color: 0x4488aa, size: 0.03, transparent: true, opacity: 0.3 });
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

// Skybox (city backdrop)
const skyGeo = new THREE.BoxGeometry(300, 150, 300);
const skyMats = [
  new THREE.MeshBasicMaterial({ color: 0x0a0a1a, side: THREE.BackSide }),
  new THREE.MeshBasicMaterial({ color: 0x0a0a1a, side: THREE.BackSide }),
  new THREE.MeshBasicMaterial({ color: 0x1a0a2e, side: THREE.BackSide }),
  new THREE.MeshBasicMaterial({ color: 0x0a0a1a, side: THREE.BackSide }),
  new THREE.MeshBasicMaterial({ color: 0x0a0a1a, side: THREE.BackSide }),
  new THREE.MeshBasicMaterial({ color: 0x0a0a1a, side: THREE.BackSide }),
];
const skybox = new THREE.Mesh(skyGeo, skyMats);
skybox.position.y = 50;
scene.add(skybox);

// Distant city silhouettes
for (let i = 0; i < 30; i++) {
  const silH = 15 + Math.random() * 40;
  const silW = 3 + Math.random() * 5;
  const silGeo = new THREE.BoxGeometry(silW, silH, silW);
  const silMat = new THREE.MeshBasicMaterial({ color: 0x0a0a1a + Math.floor(Math.random() * 0x050510) });
  const sil = new THREE.Mesh(silGeo, silMat);
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 40;
  sil.position.set(Math.cos(angle) * dist, silH / 2, Math.sin(angle) * dist - 30);
  scene.add(sil);

  // Tiny window lights on silhouettes
  if (Math.random() > 0.5) {
    for (let w = 0; w < 5; w++) {
      const wGeo = new THREE.PlaneGeometry(0.3, 0.3);
      const wMat = new THREE.MeshBasicMaterial({
        color: CONFIG.NEON_COLORS[Math.floor(Math.random() * CONFIG.NEON_COLORS.length)],
        transparent: true,
        opacity: 0.3 + Math.random() * 0.4
      });
      const wMesh = new THREE.Mesh(wGeo, wMat);
      wMesh.position.set(
        sil.position.x + (Math.random() - 0.5) * silW * 0.8,
        2 + Math.random() * (silH - 4),
        sil.position.z + silW / 2 + 0.1
      );
      scene.add(wMesh);
    }
  }
}

// ============================================
// INPUT HANDLING
// ============================================
const keys = {};

document.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;

  if (!state.playing) return;

  switch (e.key.toLowerCase()) {
    case 'w': state.moveForward = true; break;
    case 's': state.moveBackward = true; break;
    case 'a': state.moveLeft = true; break;
    case 'd': state.moveRight = true; break;
    case ' ':
      if (state.onGround && state.canJump && !state.dialogActive) {
        state.velocity.y = CONFIG.JUMP_FORCE;
        state.onGround = false;
        state.canJump = false;
        playJump();
        setTimeout(() => state.canJump = true, 300);
      }
      break;
    case 'shift': state.sprint = true; break;
    case 'q':
      if (!state.meowing && !state.dialogActive) {
        state.meowing = true;
        playMeow();
        document.getElementById('meow-text').classList.add('show');
        document.getElementById('cat-status').textContent = 'MEOWING';
        setTimeout(() => {
          state.meowing = false;
          document.getElementById('meow-text').classList.remove('show');
          document.getElementById('cat-status').textContent = 'EXPLORING';
        }, 800);
      }
      break;
    case 'f':
      if (!state.scratching) {
        state.scratching = true;
        playScratch();
        document.getElementById('cat-status').textContent = 'SCRATCHING';
        setTimeout(() => {
          state.scratching = false;
          document.getElementById('cat-status').textContent = 'EXPLORING';
        }, 600);
      }
      break;
    case 'e':
      handleInteract();
      break;
    case 'p':
      state.photoMode = !state.photoMode;
      document.getElementById('photo-mode').classList.toggle('show');
      break;
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
  switch (e.key.toLowerCase()) {
    case 'w': state.moveForward = false; break;
    case 's': state.moveBackward = false; break;
    case 'a': state.moveLeft = false; break;
    case 'd': state.moveRight = false; break;
    case 'shift': state.sprint = false; break;
  }
});

// Mouse for camera
document.addEventListener('mousemove', (e) => {
  // Update cursor
  const cursor = document.getElementById('cursor');
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';

  if (!state.playing || state.photoMode) return;
  if (document.pointerLockElement === renderer.domElement) {
    cameraYaw -= e.movementX * CONFIG.MOUSE_SENSITIVITY;
    cameraPitch -= e.movementY * CONFIG.MOUSE_SENSITIVITY;
    cameraPitch = Math.max(-1.2, Math.min(0.5, cameraPitch));
  }
});

renderer.domElement.addEventListener('click', () => {
  if (state.playing) {
    renderer.domElement.requestPointerLock();
  }
});

// ============================================
// INTERACTION SYSTEM
// ============================================
function handleInteract() {
  if (state.dialogActive) {
    advanceDialog();
    return;
  }

  if (state.interactTarget) {
    const target = state.interactTarget;
    if (target.userData && target.userData.isNPC) {
      startDialog(target);
    }
  }
}

function startDialog(npc) {
  state.dialogActive = true;
  const dialogs = npc.userData.dialogs;
  const idx = npc.userData.dialogIndex;
  
  document.getElementById('dialog-speaker').textContent = npc.userData.name;
  document.getElementById('dialog-text').textContent = dialogs[idx];
  document.getElementById('dialog-box').classList.add('show');
  
  npc.userData.dialogIndex = Math.min(idx + 1, dialogs.length - 1);
  state.npcTalked.add(npc.userData.name);
  
  playPurr();
}

function advanceDialog() {
  state.dialogActive = false;
  document.getElementById('dialog-box').classList.remove('show');
}

// ============================================
// PHYSICS & COLLISION
// ============================================
function checkCollisions(position, radius = 0.3) {
  const catBox = new THREE.Box3(
    new THREE.Vector3(position.x - radius, position.y, position.z - radius),
    new THREE.Vector3(position.x + radius, position.y + CONFIG.CAT_HEIGHT, position.z + radius)
  );

  for (const col of colliders) {
    col.box.setFromObject(col.mesh);
    if (catBox.intersectsBox(col.box)) {
      return col;
    }
  }
  return null;
}

function checkGroundCollision(position) {
  // Ground plane
  if (position.y <= 0) return 0;

  // Check platforms and colliders for standing on
  const feetY = position.y;
  for (const col of colliders) {
    col.box.setFromObject(col.mesh);
    const top = col.box.max.y;
    const minX = col.box.min.x;
    const maxX = col.box.max.x;
    const minZ = col.box.min.z;
    const maxZ = col.box.max.z;

    if (position.x > minX - 0.2 && position.x < maxX + 0.2 &&
        position.z > minZ - 0.2 && position.z < maxZ + 0.2 &&
        feetY >= top - 0.3 && feetY <= top + 0.2) {
      return top;
    }
  }

  return position.y <= 0 ? 0 : null;
}

// ============================================
// MINIMAP
// ============================================
function updateMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 150, 150);
  
  ctx.fillStyle = 'rgba(10, 10, 30, 0.8)';
  ctx.fillRect(0, 0, 150, 150);

  const scale = 1.2;
  const cx = 75;
  const cy = 75;
  const px = catGroup.position.x;
  const pz = catGroup.position.z;

  // Draw buildings as rectangles
  ctx.fillStyle = 'rgba(42, 42, 62, 0.6)';
  colliders.forEach(c => {
    const box = c.box;
    const bx = cx + (((box.min.x + box.max.x) / 2) - px) * scale;
    const by = cy + (((box.min.z + box.max.z) / 2) - pz) * scale;
    const bw = (box.max.x - box.min.x) * scale;
    const bh = (box.max.z - box.min.z) * scale;
    ctx.fillRect(bx - bw / 2, by - bh / 2, bw, bh);
  });

  // Draw NPCs
  ctx.fillStyle = '#00ffc8';
  npcs.forEach(npc => {
    const nx = cx + (npc.position.x - px) * scale;
    const ny = cy + (npc.position.z - pz) * scale;
    if (nx > 0 && nx < 150 && ny > 0 && ny < 150) {
      ctx.beginPath();
      ctx.arc(nx, ny, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Draw collectibles
  collectibles.forEach(c => {
    if (c.userData.collected) return;
    const nx = cx + (c.position.x - px) * scale;
    const ny = cy + (c.position.z - pz) * scale;
    if (nx > 0 && nx < 150 && ny > 0 && ny < 150) {
      ctx.fillStyle = c.userData.type === 'memory' ? '#00ffc8' : c.userData.type === 'fish' ? '#ff9500' : '#ffbe0b';
      ctx.beginPath();
      ctx.arc(nx, ny, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Draw player (triangle showing direction)
  ctx.fillStyle = '#ff006e';
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-cameraYaw + Math.PI);
  ctx.beginPath();
  ctx.moveTo(0, -6);
  ctx.lineTo(-4, 4);
  ctx.lineTo(4, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Border
  ctx.strokeStyle = 'rgba(0, 255, 200, 0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, 150, 150);
}

// ============================================
// GAME LOOP
// ============================================
const clock = new THREE.Clock();

function updateCatAnimation(dt, speed) {
  state.catAnimation += dt;
  
  const isMoving = speed > 0.5;
  const animSpeed = state.sprint ? 12 : 8;

  // Leg animation
  if (isMoving) {
    state.legPhase += dt * animSpeed;
    paws.forEach((leg, i) => {
      const offset = i < 2 ? 0 : Math.PI;
      const side = i % 2 === 0 ? 1 : -1;
      leg.position.y = 0.12 + Math.abs(Math.sin(state.legPhase + offset + side * 0.5)) * 0.08;
    });
  } else {
    paws.forEach(leg => {
      leg.position.y += (0.12 - leg.position.y) * 0.1;
    });
  }

  // Tail animation
  state.tailAngle += dt * (isMoving ? 4 : 2);
  tailSegments.forEach((seg, i) => {
    seg.position.x = Math.sin(state.tailAngle + i * 0.5) * 0.05 * (i + 1);
    seg.position.y = i * 0.08 + Math.sin(state.tailAngle * 0.5 + i) * 0.02;
  });

  // Head bob
  if (isMoving) {
    head.position.y = 0.5 + Math.sin(state.legPhase * 2) * 0.02;
    mask.position.y = 0.48 + Math.sin(state.legPhase * 2) * 0.02;
  }

  // Body bob
  if (isMoving) {
    torso.position.y = 0.35 + Math.sin(state.legPhase) * 0.015;
  }

  // Ear twitch
  if (Math.random() < 0.005) {
    earL.rotation.z = -0.2 + (Math.random() - 0.5) * 0.3;
    earR.rotation.z = 0.2 + (Math.random() - 0.5) * 0.3;
  }

  // Backpack LED pulse
  led.material.emissiveIntensity = 2 + Math.sin(state.catAnimation * 3) * 1;

  // Meow animation
  if (state.meowing) {
    head.scale.y = 1 + Math.sin(state.catAnimation * 20) * 0.05;
  } else {
    head.scale.y += (1 - head.scale.y) * 0.1;
  }

  // Scratch animation
  if (state.scratching) {
    paws[0].position.y = 0.12 + Math.abs(Math.sin(state.catAnimation * 25)) * 0.15;
    paws[1].position.y = 0.12 + Math.abs(Math.sin(state.catAnimation * 25 + 1)) * 0.15;
  }
}

function updateNPCs(time) {
  npcs.forEach(npc => {
    // Idle animation - slight bobbing
    npc.children[1].position.y = 1.3 + Math.sin(time * 2 + npc.position.x) * 0.03;
    
    // Look at cat if nearby
    const dist = catGroup.position.distanceTo(npc.position);
    if (dist < 8) {
      const dir = new THREE.Vector3().subVectors(catGroup.position, npc.position);
      dir.y = 0;
      const targetRot = Math.atan2(dir.x, dir.z);
      npc.rotation.y += (targetRot - npc.rotation.y) * 0.05;
    }
  });
}

function updateCollectibles(time) {
  collectibles.forEach(c => {
    if (c.userData.collected) return;

    // Floating animation
    c.children[0].position.y = Math.sin(time * 3 + c.position.x) * 0.15;
    c.children[0].rotation.y += 0.02;
    c.children[1].rotation.z += 0.01;

    // Check collection
    const dist = catGroup.position.distanceTo(c.position);
    if (dist < 1.5) {
      c.userData.collected = true;
      c.visible = false;
      playCollect();

      if (c.userData.type === 'memory') {
        state.memories++;
        document.getElementById('memories-count').textContent = `${state.memories} / 8`;
        if (state.memories >= 8) {
          document.getElementById('objective').textContent = '✦ ALL MEMORIES FOUND — THE GATE IS OPEN! ✦';
        }
      } else if (c.userData.type === 'fish') {
        state.fish++;
        document.getElementById('fish-count').textContent = state.fish;
      } else {
        state.energy++;
        document.getElementById('energy-count').textContent = state.energy;
      }
    }
  });
}

function updateMovingPlatforms(time) {
  movingPlatforms.forEach(p => {
    const val = Math.sin(time * p.speed + p.phase) * p.range;
    if (p.axis === 'y') {
      p.mesh.position.y = p.origin.y + val;
      p.edge.position.y = p.origin.y + val + 0.11;
    } else if (p.axis === 'x') {
      p.mesh.position.x = p.origin.x + val;
      p.edge.position.x = p.origin.x + val;
    }
    // Update collider
    const idx = colliders.findIndex(c => c.mesh === p.mesh);
    if (idx >= 0) colliders[idx].box.setFromObject(p.mesh);
  });
}

function updateNeonLights(time) {
  neonLights.forEach(n => {
    // Flickering neon effect
    const flicker = Math.sin(time * 8 + n.phase) * 0.3 + Math.sin(time * 13 + n.phase * 2) * 0.1;
    n.light.intensity = n.baseIntensity + flicker;
    
    // Occasional full flicker
    if (Math.random() < 0.001) {
      n.light.intensity = 0;
      setTimeout(() => { n.light.intensity = n.baseIntensity; }, 50 + Math.random() * 100);
    }
  });
}

function updateInteractionPrompt() {
  let nearestDist = Infinity;
  let nearest = null;

  npcs.forEach(npc => {
    const dist = catGroup.position.distanceTo(npc.position);
    if (dist < 3 && dist < nearestDist) {
      nearestDist = dist;
      nearest = npc;
    }
  });

  state.interactTarget = nearest;
  const prompt = document.getElementById('interact-prompt');
  if (nearest && !state.dialogActive) {
    prompt.textContent = `[E] TALK TO ${nearest.userData.name}`;
    prompt.classList.add('show');
  } else {
    prompt.classList.remove('show');
  }
}

function updateRain(dt) {
  const positions = rain.geometry.attributes.position.array;
  for (let i = 0; i < positions.length; i += 3) {
    positions[i + 1] -= dt * 15;
    if (positions[i + 1] < -2) {
      positions[i + 1] = 30;
      positions[i] = catGroup.position.x + (Math.random() - 0.5) * 60;
      positions[i + 2] = catGroup.position.z + (Math.random() - 0.5) * 60;
    }
  }
  rain.geometry.attributes.position.needsUpdate = true;
}

function updateParticles(time) {
  const positions = particleSystem.geometry.attributes.position.array;
  for (let i = 0; i < positions.length; i += 3) {
    positions[i] += Math.sin(time + i) * 0.002;
    positions[i + 1] += Math.sin(time * 0.5 + i * 0.3) * 0.003;
    positions[i + 2] += Math.cos(time * 0.7 + i * 0.2) * 0.002;
  }
  particleSystem.geometry.attributes.position.needsUpdate = true;

  // Fog planes
  particles.forEach((fog, i) => {
    fog.position.x += Math.sin(time * 0.2 + i) * 0.01;
    fog.material.opacity = 0.05 + Math.sin(time * 0.3 + i * 2) * 0.03;
  });
}

function gameLoop() {
  requestAnimationFrame(gameLoop);

  if (!state.playing) return;

  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  // Movement
  const speed = state.sprint ? CONFIG.SPRINT_SPEED : CONFIG.MOVE_SPEED;
  const moveDir = new THREE.Vector3();

  if (!state.dialogActive) {
    if (state.moveForward) moveDir.z -= 1;
    if (state.moveBackward) moveDir.z += 1;
    if (state.moveLeft) moveDir.x -= 1;
    if (state.moveRight) moveDir.x += 1;
  }

  moveDir.normalize();

  // Rotate movement direction by camera yaw
  const rotatedDir = new THREE.Vector3(
    moveDir.x * Math.cos(cameraYaw) - moveDir.z * Math.sin(cameraYaw),
    0,
    moveDir.x * Math.sin(cameraYaw) + moveDir.z * Math.cos(cameraYaw)
  );

  // Apply movement
  const newPos = catGroup.position.clone();
  newPos.x += rotatedDir.x * speed * dt;
  newPos.z += rotatedDir.z * speed * dt;

  // Horizontal collision
  const hCol = checkCollisions(newPos);
  if (!hCol) {
    catGroup.position.x = newPos.x;
    catGroup.position.z = newPos.z;
  } else {
    // Slide along wall
    const testX = catGroup.position.clone();
    testX.x = newPos.x;
    if (!checkCollisions(testX)) {
      catGroup.position.x = newPos.x;
    }
    const testZ = catGroup.position.clone();
    testZ.z = newPos.z;
    if (!checkCollisions(testZ)) {
      catGroup.position.z = newPos.z;
    }
  }

  // Gravity
  state.velocity.y += CONFIG.GRAVITY * dt;
  catGroup.position.y += state.velocity.y * dt;

  // Ground check
  const groundY = checkGroundCollision(catGroup.position);
  if (groundY !== null && catGroup.position.y <= groundY) {
    catGroup.position.y = groundY;
    state.velocity.y = 0;
    state.onGround = true;
  } else if (catGroup.position.y <= 0) {
    catGroup.position.y = 0;
    state.velocity.y = 0;
    state.onGround = true;
  } else {
    state.onGround = false;
  }

  // Respawn if fallen too far
  if (catGroup.position.y < -10) {
    catGroup.position.set(0, 2, 0);
    state.velocity.set(0, 0, 0);
  }

  // Cat facing direction
  if (moveDir.length() > 0.1) {
    const targetRotY = Math.atan2(rotatedDir.x, rotatedDir.z);
    catBody.rotation.y += (targetRotY - catBody.rotation.y) * 0.15;
  }

  // Update cat animation
  const moveSpeed = moveDir.length() * speed;
  updateCatAnimation(dt, moveSpeed);

  // Camera follow
  const catPos = catGroup.position.clone();
  catPos.y += 0.5;
  cameraTarget.lerp(catPos, 0.1);

  const camX = cameraTarget.x + Math.sin(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;
  const camY = cameraTarget.y + Math.sin(-cameraPitch) * cameraDistance + cameraHeight;
  const camZ = cameraTarget.z + Math.cos(cameraYaw) * Math.cos(cameraPitch) * cameraDistance;

  camera.position.set(camX, camY, camZ);
  camera.lookAt(cameraTarget);

  // Update cat status display
  if (!state.meowing && !state.scratching) {
    if (moveSpeed > 10) {
      document.getElementById('cat-status').textContent = 'SPRINTING';
    } else if (moveSpeed > 1) {
      document.getElementById('cat-status').textContent = 'EXPLORING';
    } else if (!state.onGround) {
      document.getElementById('cat-status').textContent = 'IN THE AIR';
    } else {
      document.getElementById('cat-status').textContent = 'IDLE';
    }
  }

  // Update world
  updateNPCs(time);
  updateCollectibles(time);
  updateMovingPlatforms(time);
  updateNeonLights(time);
  updateInteractionPrompt();
  updateRain(dt);
  updateParticles(time);
  updateMinimap();

  // Update objectives
  if (state.npcTalked.size >= 2 && state.currentObjective === 0) {
    state.currentObjective = 1;
    document.getElementById('objective').textContent = state.objectives[1];
  }
  if (state.memories >= 3 && state.currentObjective === 1) {
    state.currentObjective = 2;
    document.getElementById('objective').textContent = state.objectives[2];
  }
  if (state.npcTalked.size >= 4 && state.currentObjective === 2) {
    state.currentObjective = 3;
    document.getElementById('objective').textContent = state.objectives[3];
  }
  if (state.memories >= 8 && state.currentObjective < 4) {
    state.currentObjective = 4;
    document.getElementById('objective').textContent = state.objectives[4];
  }

  renderer.render(scene, camera);
}

// ============================================
// LOADING & INITIALIZATION
// ============================================
const loadingStages = [
  'BUILDING WORLD GEOMETRY...',
  'PLACING NEON LIGHTS...',
  'WAKING UP ROBOTS...',
  'HIDING COLLECTIBLES...',
  'PIXEL IS STRETCHING...',
  'RAIN SYSTEMS ONLINE...',
  'CITY READY.'
];

let loadProgress = 0;
const loadInterval = setInterval(() => {
  loadProgress += Math.random() * 15 + 5;
  if (loadProgress > 100) loadProgress = 100;

  document.getElementById('loading-bar').style.width = loadProgress + '%';
  const stageIdx = Math.min(Math.floor(loadProgress / 100 * loadingStages.length), loadingStages.length - 1);
  document.getElementById('loading-text').textContent = loadingStages[stageIdx];

  if (loadProgress >= 100) {
    clearInterval(loadInterval);
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('title-screen').classList.add('show');
    }, 500);
  }
}, 200);

// Start game
document.getElementById('title-screen').addEventListener('click', () => {
  initAudio();
  document.getElementById('title-screen').classList.remove('show');
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('hud').classList.add('show');
  state.playing = true;
  renderer.domElement.requestPointerLock();
  clock.start();
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start the loop
gameLoop();
