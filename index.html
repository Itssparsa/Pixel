<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL — A Stray Cat's Journey</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Share Tech Mono',monospace;cursor:none;user-select:none}
canvas{display:block}
#cursor{position:fixed;width:6px;height:6px;pointer-events:none;z-index:10000;transform:translate(-50%,-50%);border-radius:50%;background:rgba(0,255,200,0.9);box-shadow:0 0 10px rgba(0,255,200,0.4)}
#loading-screen{position:fixed;inset:0;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.8s}
#loading-screen.hidden{opacity:0;pointer-events:none}
.ld-cat{margin-bottom:30px;opacity:0.8}
.ld-title{font-family:'Orbitron',sans-serif;font-size:64px;font-weight:900;color:#fff;letter-spacing:16px;margin-bottom:6px;text-shadow:0 0 40px rgba(0,255,200,0.4)}
.ld-sub{font-size:13px;color:rgba(0,255,200,0.6);letter-spacing:10px;margin-bottom:50px}
.ld-bar-wrap{width:320px;height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden;margin-bottom:16px}
.ld-bar{height:100%;width:0%;background:linear-gradient(90deg,#00ffc8,#ff006e);transition:width 0.3s}
.ld-text{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:5px}
#title-screen{position:fixed;inset:0;background:linear-gradient(180deg,#080812,#12081e);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;cursor:pointer}
#title-screen.show{display:flex}
.t-main{font-family:'Orbitron',sans-serif;font-size:110px;font-weight:900;color:#fff;text-shadow:0 0 80px rgba(0,255,200,0.3),0 0 160px rgba(255,0,110,0.15);letter-spacing:24px;margin-bottom:8px}
.t-tag{font-size:15px;color:rgba(0,255,200,0.5);letter-spacing:14px;margin-bottom:70px}
.t-start{font-size:14px;color:rgba(255,255,255,0.45);letter-spacing:8px;animation:pulse 2s ease-in-out infinite}
.t-ctrl{position:absolute;bottom:50px;font-size:11px;color:rgba(255,255,255,0.18);letter-spacing:3px;text-align:center;line-height:2.2}
.t-ctrl span{color:rgba(0,255,200,0.5)}
@keyframes pulse{0%,100%{opacity:0.45}50%{opacity:1}}
#hud{position:fixed;inset:0;pointer-events:none;z-index:100;display:none}
#hud.show{display:block}
.h-top{position:absolute;top:24px;left:28px;right:28px;display:flex;justify-content:space-between;align-items:flex-start}
.h-cat{display:flex;align-items:center;gap:12px}
.h-icon{width:42px;height:42px;border:1.5px solid rgba(0,255,200,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(0,255,200,0.06)}
.h-name{font-family:'Orbitron',sans-serif;font-size:15px;color:rgba(0,255,200,0.9);letter-spacing:4px}
.h-status{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-top:3px}
.h-items{display:flex;gap:16px}
.h-item{display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.6)}
.h-item-ic{width:24px;height:24px;border:1px solid rgba(255,255,255,0.15);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;background:rgba(255,255,255,0.03)}
.h-obj{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,0.4);letter-spacing:3px;padding:7px 20px;background:rgba(0,0,0,0.35);border-radius:16px;backdrop-filter:blur(4px)}
.h-interact{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:3px;padding:8px 24px;border:1px solid rgba(0,255,200,0.25);border-radius:24px;background:rgba(0,0,0,0.4);display:none}
.h-interact.show{display:block}
.h-meow{position:absolute;bottom:75px;left:50%;transform:translateX(-50%);font-size:20px;color:#ff006e;opacity:0;transition:opacity 0.2s;font-family:'Orbitron',sans-serif}
.h-meow.show{opacity:1}
.h-minimap{position:absolute;bottom:24px;right:24px;width:130px;height:130px;border:1px solid rgba(0,255,200,0.2);border-radius:10px;background:rgba(0,0,0,0.5);overflow:hidden}
#dialog{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:550px;padding:20px 26px;background:rgba(8,8,20,0.92);border:1px solid rgba(0,255,200,0.2);border-radius:10px;backdrop-filter:blur(16px);z-index:200;display:none}
#dialog.show{display:block}
.d-name{font-family:'Orbitron',sans-serif;font-size:11px;color:#00ffc8;letter-spacing:3px;margin-bottom:8px}
.d-text{font-size:13px;color:rgba(255,255,255,0.75);line-height:1.8;letter-spacing:0.5px}
.d-hint{font-size:10px;color:rgba(255,255,255,0.2);text-align:right;margin-top:10px;letter-spacing:2px}
.scanlines{position:fixed;inset:0;pointer-events:none;z-index:99;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 4px)}
.vignette{position:fixed;inset:0;pointer-events:none;z-index:98;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.5) 100%)}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="loading-screen">
  <div class="ld-cat">
    <svg width="70" height="50" viewBox="0 0 70 50" fill="none">
      <path d="M12 22L17 8L24 19" stroke="rgba(0,255,200,0.6)" stroke-width="1.5" fill="rgba(0,255,200,0.05)"/>
      <path d="M46 19L53 8L58 22" stroke="rgba(0,255,200,0.6)" stroke-width="1.5" fill="rgba(0,255,200,0.05)"/>
      <ellipse cx="35" cy="30" rx="22" ry="15" stroke="rgba(0,255,200,0.6)" stroke-width="1.5" fill="rgba(0,255,200,0.03)"/>
      <circle cx="28" cy="26" r="2.5" fill="rgba(0,255,200,0.7)"/>
      <circle cx="42" cy="26" r="2.5" fill="rgba(0,255,200,0.7)"/>
      <path d="M33 31L35 33L37 31" stroke="#ff006e" stroke-width="1.5"/>
      <path d="M57 34Q65 31 68 37" stroke="rgba(0,255,200,0.5)" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="ld-title">PIXEL</div>
  <div class="ld-sub">A STRAY CAT'S JOURNEY</div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
  <div class="ld-text" id="ld-text">INITIALIZING...</div>
</div>
<div id="title-screen">
  <div class="t-main">PIXEL</div>
  <div class="t-tag">A STRAY CAT'S JOURNEY</div>
  <div class="t-start">CLICK TO BEGIN</div>
  <div class="t-ctrl">
    <span>WASD</span> MOVE &nbsp; <span>SPACE</span> JUMP &nbsp; <span>SHIFT</span> SPRINT &nbsp; <span>E</span> INTERACT<br>
    <span>Q</span> MEOW &nbsp; <span>F</span> SCRATCH &nbsp; <span>MOUSE</span> CAMERA &nbsp; <span>P</span> PHOTO MODE
  </div>
</div>
<div id="hud">
  <div class="h-top">
    <div class="h-cat">
      <div class="h-icon">🐱</div>
      <div>
        <div class="h-name">PIXEL</div>
        <div class="h-status" id="cat-status">EXPLORING</div>
      </div>
    </div>
    <div class="h-items">
      <div class="h-item"><div class="h-item-ic">💾</div><span id="mem-ct">0/8</span></div>
      <div class="h-item"><div class="h-item-ic">🐟</div><span id="fish-ct">0</span></div>
      <div class="h-item"><div class="h-item-ic">⚡</div><span id="nrg-ct">0</span></div>
    </div>
  </div>
  <div class="h-obj" id="objective">EXPLORE THE NEON DISTRICT</div>
  <div class="h-meow" id="meow-txt">Meow!</div>
  <div class="h-interact" id="interact-pr">[E] INTERACT</div>
  <div class="h-minimap"><canvas id="minimap" width="130" height="130"></canvas></div>
</div>
<div id="dialog">
  <div class="d-name" id="d-name">ROBOT</div>
  <div class="d-text" id="d-text"></div>
  <div class="d-hint">[E] CONTINUE</div>
</div>
<div class="scanlines"></div>
<div class="vignette"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// =============================================
// PIXEL — Optimized Stray-Inspired 3D Game
// =============================================
const C={GRAV:-22,JUMP:9.5,SPEED:7.5,SPRINT:13,SENS:0.002,CAT_H:0.55};

const S={
  playing:false,memories:0,fish:0,energy:0,meowing:false,scratching:false,
  dialogActive:false,interactTarget:null,photoMode:false,
  vel:new THREE.Vector3(),onGround:false,canJump:true,
  fwd:false,bwd:false,left:false,right:false,sprint:false,
  legPhase:0,tailPhase:0,animTime:0,npcTalked:new Set(),objIdx:0,
  objectives:['EXPLORE THE NEON DISTRICT','FIND MEMORY CHIPS','TALK TO ROBOTS','REACH THE UPPER CITY','FIND THE WAY OUT']
};

// --- RENDERER ---
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x06060f);
scene.fog=new THREE.FogExp2(0x06060f,0.016);
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,250);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,1.5));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
document.body.insertBefore(renderer.domElement,document.body.firstChild);

// --- LIGHTS (minimal) ---
scene.add(new THREE.AmbientLight(0x1a1a3e,0.5));
scene.add(new THREE.HemisphereLight(0x1a0a2e,0x0a1a0a,0.4));
const moon=new THREE.DirectionalLight(0x3355aa,0.4);
moon.position.set(40,60,20);
moon.castShadow=true;
moon.shadow.mapSize.set(1024,1024);
moon.shadow.camera.near=1;moon.shadow.camera.far=150;
const sc=50;
moon.shadow.camera.left=-sc;moon.shadow.camera.right=sc;
moon.shadow.camera.top=sc;moon.shadow.camera.bottom=-sc;
scene.add(moon);

// --- MATERIALS ---
function mat(c,r=0.8,m=0.1,o={}){return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m,...o})}
function nMat(c,i=2){return new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:i,roughness:0.1})}
const M={
  ground:mat(0x12121e,0.95),concrete:mat(0x22222e,0.85),concDark:mat(0x18181e,0.9),
  metal:mat(0x1e1e2e,0.4,0.85),wood:mat(0x3a2818,0.95,0),
  nC:nMat(0x00ffc8),nP:nMat(0xff006e),nB:nMat(0x00b4d8),nY:nMat(0xffbe0b),nPu:nMat(0x8338ec),
  water:mat(0x081828,0.05,0.5,{transparent:true,opacity:0.55}),
  catBody:mat(0xfaebd7,0.65,0),catPoint:mat(0x3b2314,0.6,0),catPointM:mat(0x5a3a22,0.6,0),
  catNose:mat(0xd4868a,0.5,0),
  catEye:new THREE.MeshStandardMaterial({color:0x5599ff,emissive:0x2255cc,emissiveIntensity:0.6,roughness:0.05}),
  catPupil:mat(0x050510,0.1,0),catInnerEar:mat(0xe8b4b8,0.7,0),
  robot:mat(0x3a3a4e,0.3,0.9),robotEye:nMat(0x00ffc8,3),backpack:mat(0x252535,0.35,0.7)
};

// --- HELPERS ---
const colliders=[],neonLights=[],npcs=[],collectibles=[],movPlats=[];
function addB(w,h,d,x,y,z,m,sh=true){
  const ms=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
  ms.position.set(x,y,z);if(sh){ms.castShadow=true;ms.receiveShadow=true}scene.add(ms);return ms;
}
function addCol(m){colliders.push({mesh:m,box:new THREE.Box3().setFromObject(m)})}

// =============================================
// DETAILED SIAMESE CAT MODEL
// =============================================
const cat=new THREE.Group();
const catBody=new THREE.Group();

// --- Torso: smooth elongated Siamese shape ---
const torsoGeo=new THREE.SphereGeometry(1,14,10);
torsoGeo.scale(0.22,0.17,0.45);
const torso=new THREE.Mesh(torsoGeo,M.catBody);
torso.position.set(0,0.36,0);torso.castShadow=true;
catBody.add(torso);

// Chest
const chestGeo=new THREE.SphereGeometry(0.20,10,8);
const chest=new THREE.Mesh(chestGeo,M.catBody);
chest.position.set(0,0.36,0.28);chest.scale.set(1,0.9,0.85);
catBody.add(chest);

// Rump
const rump=new THREE.Mesh(new THREE.SphereGeometry(0.19,10,8),M.catBody);
rump.position.set(0,0.37,-0.30);rump.scale.set(1,0.88,0.85);
catBody.add(rump);

// Belly (underneath, slightly darker cream)
const belly=new THREE.Mesh(new THREE.SphereGeometry(1,10,6),mat(0xf0dcc4,0.7,0));
belly.scale.set(0.16,0.08,0.35);
belly.position.set(0,0.24,0);
catBody.add(belly);

// --- HEAD (wedge-shaped, Siamese characteristic) ---
const headGrp=new THREE.Group();
headGrp.position.set(0,0.50,0.48);

// Skull
const skullGeo=new THREE.SphereGeometry(0.18,14,12);
const skull=new THREE.Mesh(skullGeo,M.catBody);
skull.scale.set(1,0.93,0.98);
headGrp.add(skull);

// Siamese seal-point mask
const mask=new THREE.Mesh(new THREE.SphereGeometry(0.155,10,8),M.catPoint);
mask.position.set(0,-0.025,0.05);mask.scale.set(0.88,0.72,0.68);
headGrp.add(mask);

// Muzzle
const muzzle=new THREE.Mesh(new THREE.SphereGeometry(0.075,8,7),M.catPoint);
muzzle.position.set(0,-0.055,0.13);muzzle.scale.set(1.15,0.65,1.05);
headGrp.add(muzzle);

// Chin
const chin=new THREE.Mesh(new THREE.SphereGeometry(0.04,6,5),M.catBody);
chin.position.set(0,-0.1,0.1);
headGrp.add(chin);

// Nose
const nose=new THREE.Mesh(new THREE.SphereGeometry(0.022,6,6),M.catNose);
nose.position.set(0,-0.025,0.18);
headGrp.add(nose);

// Nose bridge highlight
const noseBr=new THREE.Mesh(new THREE.SphereGeometry(0.015,5,4),M.catPointM);
noseBr.position.set(0,-0.01,0.17);
headGrp.add(noseBr);

// --- EYES (vivid blue, almond-shaped) ---
function mkEye(xo){
  const eg=new THREE.Group();
  // Eyeball
  const ball=new THREE.Mesh(new THREE.SphereGeometry(0.048,10,8),M.catEye);
  ball.scale.set(1.15,1.35,0.65);
  eg.add(ball);
  // Pupil
  const pup=new THREE.Mesh(new THREE.SphereGeometry(0.023,6,6),M.catPupil);
  pup.position.z=0.028;pup.scale.set(0.45,1.25,0.5);
  eg.add(pup);
  // Eye shine
  const shine=new THREE.Mesh(new THREE.SphereGeometry(0.01,5,5),
    new THREE.MeshBasicMaterial({color:0xffffff}));
  shine.position.set(0.01,0.015,0.035);
  eg.add(shine);
  // Glow
  const glow=new THREE.Mesh(new THREE.SphereGeometry(0.052,8,6),
    new THREE.MeshBasicMaterial({color:0x5599ff,transparent:true,opacity:0.1}));
  eg.add(glow);
  eg.position.set(xo,0.02,0.12);
  return eg;
}
const eyeL=mkEye(-0.072),eyeR=mkEye(0.072);
headGrp.add(eyeL);headGrp.add(eyeR);

// --- EARS (tall triangular Siamese ears) ---
function mkEar(xo,zr){
  const eg=new THREE.Group();
  const outer=new THREE.Mesh(new THREE.ConeGeometry(0.062,0.17,4),M.catPoint);
  outer.rotation.z=zr;
  eg.add(outer);
  const inner=new THREE.Mesh(new THREE.ConeGeometry(0.038,0.11,4),M.catInnerEar);
  inner.position.set(0,0.01,0.012);inner.rotation.z=zr;
  eg.add(inner);
  eg.position.set(xo,0.17,-0.015);
  return eg;
}
const earL=mkEar(-0.095,-0.15),earR=mkEar(0.095,0.15);
headGrp.add(earL);headGrp.add(earR);

// --- WHISKERS ---
function mkW(x,y,z,rx,ry){
  const g=new THREE.CylinderGeometry(0.0025,0.001,0.16,3);
  g.rotateZ(Math.PI/2);
  const w=new THREE.Mesh(g,new THREE.MeshBasicMaterial({color:0xcccccc,transparent:true,opacity:0.4}));
  w.position.set(x,y,z);w.rotation.set(rx,ry,0);return w;
}
headGrp.add(mkW(-0.07,-0.04,0.15,0,0.25));
headGrp.add(mkW(-0.07,-0.06,0.14,0.12,0.25));
headGrp.add(mkW(-0.07,-0.025,0.14,-0.12,0.25));
headGrp.add(mkW(0.07,-0.04,0.15,0,-0.25));
headGrp.add(mkW(0.07,-0.06,0.14,0.12,-0.25));
headGrp.add(mkW(0.07,-0.025,0.14,-0.12,-0.25));

catBody.add(headGrp);

// --- NECK ---
const neck=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.12,0.15,8),M.catBody);
neck.position.set(0,0.44,0.35);neck.rotation.x=0.35;
catBody.add(neck);

// --- LEGS (articulated, dark-pointed) ---
const legs=[];
const legDefs=[
  {x:-0.13,z:0.22,isFront:true},
  {x:0.13,z:0.22,isFront:true},
  {x:-0.13,z:-0.26,isFront:false},
  {x:0.13,z:-0.26,isFront:false}
];

legDefs.forEach((ld,i)=>{
  const lg=new THREE.Group();
  lg.position.set(ld.x,0.22,ld.z);

  // Upper leg (thigh)
  const upper=new THREE.Mesh(new THREE.CylinderGeometry(0.042,0.038,0.16,7),
    ld.isFront?M.catBody:M.catBody);
  upper.position.y=-0.01;
  lg.add(upper);

  // Lower leg (shin - darker transition)
  const lower=new THREE.Mesh(new THREE.CylinderGeometry(0.037,0.032,0.12,6),M.catPointM);
  lower.position.y=-0.11;
  lg.add(lower);

  // Paw (dark seal point)
  const paw=new THREE.Mesh(new THREE.SphereGeometry(0.038,7,5),M.catPoint);
  paw.position.y=-0.19;paw.scale.set(1.1,0.55,1.35);
  lg.add(paw);

  // Toe detail
  for(let t=-1;t<=1;t++){
    const toe=new THREE.Mesh(new THREE.SphereGeometry(0.012,4,4),M.catPoint);
    toe.position.set(t*0.015,-0.21,0.02);
    lg.add(toe);
  }

  catBody.add(lg);
  legs.push(lg);
});

// --- TAIL (long, elegant, dark-tipped) ---
const tailGrp=new THREE.Group();
tailGrp.position.set(0,0.40,-0.40);
const tailSegs=[];
const TC=10;
for(let i=0;i<TC;i++){
  const t=i/(TC-1);
  const r=0.033-t*0.018;
  const m=t<0.3?M.catBody:t<0.5?M.catPointM:M.catPoint;
  const seg=new THREE.Mesh(new THREE.SphereGeometry(r,6,5),m);
  seg.position.set(0,i*0.065,-i*0.04);
  tailGrp.add(seg);
  tailSegs.push(seg);
}
catBody.add(tailGrp);

// --- BACKPACK (B-12 companion device) ---
const bpGrp=new THREE.Group();
// Main body
const bpMain=new THREE.Mesh(new THREE.BoxGeometry(0.17,0.09,0.12),M.backpack);
bpGrp.add(bpMain);
// Detail panel
const bpPanel=new THREE.Mesh(new THREE.BoxGeometry(0.13,0.06,0.005),mat(0x1a1a28,0.5,0.7));
bpPanel.position.set(0,0,0.063);
bpGrp.add(bpPanel);
// LED strip
const bpLed=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.015,0.003),M.nC);
bpLed.position.set(0,0.025,0.064);
bpGrp.add(bpLed);
// Side lights
[-0.07,0.07].forEach(x=>{
  const sl=new THREE.Mesh(new THREE.SphereGeometry(0.008,5,5),nMat(0x00ffc8,1.5));
  sl.position.set(x,0,0.063);bpGrp.add(sl);
});
// Antenna
const ant=new THREE.Mesh(new THREE.CylinderGeometry(0.004,0.004,0.07,4),M.metal);
ant.position.set(0.05,0.075,0);bpGrp.add(ant);
const antTip=new THREE.Mesh(new THREE.SphereGeometry(0.01,5,5),M.nC);
antTip.position.set(0.05,0.115,0);bpGrp.add(antTip);

bpGrp.position.set(0,0.54,-0.05);
catBody.add(bpGrp);

cat.add(catBody);
cat.position.set(0,0,0);
scene.add(cat);

// Cat ground shadow
const catShad=new THREE.Mesh(
  new THREE.PlaneGeometry(0.6,0.85),
  new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:0.2,depthWrite:false})
);
catShad.rotation.x=-Math.PI/2;catShad.position.y=0.01;
scene.add(catShad);

// =============================================
// CAMERA
// =============================================
let camYaw=0,camPitch=-0.25;
const camTgt=new THREE.Vector3();

// =============================================
// WORLD BUILDING

// --- BUILDINGS ---
function bldg(x,z,w,d,h,nCol,door=false){
  const b=addB(w,h,d,x,h/2,z,M.concrete);addCol(b);
  addB(w+0.15,0.08,d+0.15,x,h+0.04,z,M.concDark,false);
  // Windows (cheap: emissive planes, no lights)
  const wR=Math.floor(h/2),wC=Math.max(1,Math.floor(w/2.2));
  for(let r=0;r<wR;r++)for(let c=0;c<wC;c++){
    if(Math.random()<0.3)continue;
    const wx=x+(c-(wC-1)/2)*2, wy=2+r*2;
    const lc=Math.random()<0.3?(nCol||0x2a4a6a):0x1a2a3a+Math.floor(Math.random()*0x0a1520);
    const wm=new THREE.MeshBasicMaterial({color:lc,transparent:true,opacity:0.2+Math.random()*0.4});
    const wf=new THREE.Mesh(new THREE.PlaneGeometry(0.65,0.95),wm);
    wf.position.set(wx,wy,z+d/2+0.01);scene.add(wf);
    const wb=new THREE.Mesh(new THREE.PlaneGeometry(0.65,0.95),wm);
    wb.position.set(wx,wy,z-d/2-0.01);wb.rotation.y=Math.PI;scene.add(wb);
  }
  // Neon trims
  if(nCol){
    const nm=nMat(nCol,1.5);
    addB(w+0.1,0.05,0.05,x,0.4,z+d/2+0.04,nm,false);
    addB(w+0.1,0.05,0.05,x,h-0.3,z+d/2+0.04,nm,false);
    addB(0.05,h*0.4,0.05,x+w/2-0.1,h*0.6,z+d/2+0.04,nm,false);
    addB(0.05,h*0.4,0.05,x-w/2+0.1,h*0.6,z+d/2+0.04,nm,false);
    const pl=new THREE.PointLight(nCol,1.5,12);
    pl.position.set(x,2.5,z+d/2+1.5);scene.add(pl);
    neonLights.push({light:pl,base:1.5,ph:Math.random()*6.28});
  }
  if(door){
    addB(0.8,1.6,0.05,x,0.8,z+d/2+0.03,mat(0x111111,0.9),false);
    addB(0.9,1.7,0.015,x,0.85,z+d/2+0.04,nMat(nCol||0x00ffc8,0.8),false);
  }
}

// AUDIO

let actx;
function initA(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(f,f2,dur,type='sine',vol=0.12){
  if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);o.type=type;
  o.frequency.setValueAtTime(f,actx.currentTime);
  if(f2)o.frequency.exponentialRampToValueAtTime(f2,actx.currentTime+dur*0.7);
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.start();o.stop(actx.currentTime+dur);
}
function meowSfx(){sfx(800,1200,0.15);setTimeout(()=>sfx(1100,500,0.3),120)}
function jumpSfx(){sfx(300,550,0.12,'sine',0.07)}
function collectSfx(){sfx(523,784,0.35,'triangle',0.1)}
function scratchSfx(){
  if(!actx)return;const buf=actx.createBuffer(1,actx.sampleRate*0.15,actx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.08;
  const s=actx.createBufferSource(),f=actx.createBiquadFilter();
  f.type='bandpass';f.frequency.value=3500;
  s.buffer=buf;s.connect(f);f.connect(actx.destination);s.start();
}

document.addEventListener('mousemove',e=>{
  document.getElementById('cursor').style.left=e.clientX+'px';
  document.getElementById('cursor').style.top=e.clientY+'px';
  if(!S.playing||S.photoMode)return;
  if(document.pointerLockElement===renderer.domElement){
    camYaw-=e.movementX*C.SENS;
    camPitch=Math.max(-1.2,Math.min(0.5,camPitch-e.movementY*C.SENS));
  }
});
renderer.domElement.addEventListener('click',()=>{if(S.playing)renderer.domElement.requestPointerLock()});
document.addEventListener('keydown',e=>{
  if(!S.playing)return;const k=e.key.toLowerCase();
  switch(k){
    case'w':S.fwd=true;break;case's':S.bwd=true;break;
    case'a':S.left=true;break;case'd':S.right=true;break;
    case'shift':S.sprint=true;break;
    case' ':
      if(S.onGround&&S.canJump&&!S.dialogActive){
        S.vel.y=C.JUMP;S.onGround=false;S.canJump=false;jumpSfx();
        setTimeout(()=>S.canJump=true,250);
      }e.preventDefault();break;
    case'q':
      if(!S.meowing&&!S.dialogActive){
        S.meowing=true;meowSfx();
        document.getElementById('meow-txt').classList.add('show');
        document.getElementById('cat-status').textContent='MEOWING';
        setTimeout(()=>{S.meowing=false;document.getElementById('meow-txt').classList.remove('show')},700);
      }break;
    case'f':
      if(!S.scratching){S.scratching=true;scratchSfx();
        document.getElementById('cat-status').textContent='SCRATCHING';
        setTimeout(()=>S.scratching=false,500);}break;
    case'e':handleInteract();break;
    case'p':S.photoMode=!S.photoMode;break;
  }
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  switch(k){case'w':S.fwd=false;break;case's':S.bwd=false;break;
  case'a':S.left=false;break;case'd':S.right=false;break;case'shift':S.sprint=false;break;}
});

// DIALOG
// =============================================
function handleInteract(){
  if(S.dialogActive){S.dialogActive=false;document.getElementById('dialog').classList.remove('show');return;}
  if(S.interactTarget){
    const u=S.interactTarget.userData;S.dialogActive=true;
    document.getElementById('d-name').textContent=u.name;
    document.getElementById('d-text').textContent=u.dlgs[u.di];
    document.getElementById('dialog').classList.add('show');
    u.di=Math.min(u.di+1,u.dlgs.length-1);S.npcTalked.add(u.name);
  }
}

// =============================================
// PHYSICS
// =============================================
function collide(pos,r=0.25){
  const b=new THREE.Box3(
    new THREE.Vector3(pos.x-r,pos.y,pos.z-r),
    new THREE.Vector3(pos.x+r,pos.y+C.CAT_H,pos.z+r));
  for(const c of colliders){c.box.setFromObject(c.mesh);if(b.intersectsBox(c.box))return c;}
  return null;
}
function gndCheck(pos){
  if(pos.y<=0)return 0;
  for(const c of colliders){
    c.box.setFromObject(c.mesh);const top=c.box.max.y;
    if(pos.x>c.box.min.x-0.2&&pos.x<c.box.max.x+0.2&&
       pos.z>c.box.min.z-0.2&&pos.z<c.box.max.z+0.2&&
       pos.y>=top-0.3&&pos.y<=top+0.15)return top;
  }
  return null;
}

// =============================================
// ANIMATION
// =============================================
function animCat(dt,spd){
  S.animTime+=dt;const mv=spd>0.5,as=S.sprint?14:10;
  if(mv){
    S.legPhase+=dt*as;
    legs.forEach((l,i)=>{
      const off=i<2?0:Math.PI,si=i%2===0?1:-1;
      l.rotation.x=Math.sin(S.legPhase+off+si*0.4)*0.4;
      l.position.y=0.22+Math.abs(Math.sin(S.legPhase+off+si*0.4))*0.03;
    });
  }else{
    legs.forEach(l=>{l.rotation.x*=0.9;l.position.y+=(0.22-l.position.y)*0.1});
  }
  S.tailPhase+=dt*(mv?5:2.5);
  tailSegs.forEach((s,i)=>{
    s.position.x=Math.sin(S.tailPhase+i*0.55)*0.055*(i+1);
    s.position.y=i*0.065+Math.sin(S.tailPhase*0.4+i*0.8)*0.012*i;
  });
  if(mv){
    headGrp.position.y=0.50+Math.sin(S.legPhase*2)*0.012;
    torso.position.y=0.36+Math.sin(S.legPhase)*0.008;
    // Slight body sway
    catBody.rotation.z = Math.sin(S.legPhase)*0.02;
  } else {
    catBody.rotation.z *= 0.95;
  }
  if(Math.random()<0.006){
    earL.rotation.z=-0.15+(Math.random()-0.5)*0.25;
    earR.rotation.z=0.15+(Math.random()-0.5)*0.25;
  }
  bpLed.material.emissiveIntensity=1.5+Math.sin(S.animTime*3)*0.8;
  antTip.material.emissiveIntensity=1.5+Math.sin(S.animTime*4+1)*0.8;
  if(S.meowing){
    skull.scale.y=0.93+Math.sin(S.animTime*25)*0.04;
    muzzle.scale.y=0.65+Math.sin(S.animTime*25)*0.12;
  }else{
    skull.scale.y+=(0.93-skull.scale.y)*0.15;
    muzzle.scale.y+=(0.65-muzzle.scale.y)*0.15;
  }
  if(S.scratching){legs[0].rotation.x=Math.sin(S.animTime*30)*0.6;legs[1].rotation.x=Math.sin(S.animTime*30+1)*0.6;}
  if(!mv&&!S.meowing&&!S.scratching){
    torso.scale.y=1+Math.sin(S.animTime*1.5)*0.012;
    chest.scale.y=0.9+Math.sin(S.animTime*1.5)*0.008;
  }
}

// =============================================
// MINIMAP
// =============================================
function drawMM(){
  const cv=document.getElementById('minimap'),ctx=cv.getContext('2d');
  ctx.clearRect(0,0,130,130);
  ctx.fillStyle='rgba(6,6,15,0.85)';ctx.fillRect(0,0,130,130);
  const s=1.1,cx=65,cy=65,px=cat.position.x,pz=cat.position.z;
  ctx.fillStyle='rgba(30,30,50,0.5)';
  colliders.forEach(c=>{
    const b=c.box,bx=cx+(((b.min.x+b.max.x)/2)-px)*s,by=cy+(((b.min.z+b.max.z)/2)-pz)*s;
    const bw=(b.max.x-b.min.x)*s,bh=(b.max.z-b.min.z)*s;
    if(bx>-20&&bx<150&&by>-20&&by<150)ctx.fillRect(bx-bw/2,by-bh/2,bw,bh);
  });
  ctx.fillStyle='#00ffc8';
  npcs.forEach(n=>{
    const nx=cx+(n.position.x-px)*s,ny=cy+(n.position.z-pz)*s;
    if(nx>0&&nx<130&&ny>0&&ny<130){ctx.beginPath();ctx.arc(nx,ny,2.5,0,6.28);ctx.fill();}
  });
  collectibles.forEach(c=>{
    if(c.userData.collected)return;
    ctx.fillStyle=c.userData.type==='memory'?'#00ffc8':c.userData.type==='fish'?'#ff9500':'#ffbe0b';
    const nx=cx+(c.position.x-px)*s,ny=cy+(c.position.z-pz)*s;
    if(nx>0&&nx<130&&ny>0&&ny<130){ctx.beginPath();ctx.arc(nx,ny,1.8,0,6.28);ctx.fill();}
  });
  ctx.fillStyle='#ff006e';ctx.save();ctx.translate(cx,cy);ctx.rotate(-camYaw+Math.PI);
  ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(-3,3);ctx.lineTo(3,3);ctx.closePath();ctx.fill();ctx.restore();
  ctx.strokeStyle='rgba(0,255,200,0.15)';ctx.strokeRect(0,0,130,130);
}

// =============================================
// MAIN LOOP
// =============================================
const clock=new THREE.Clock();
let fc=0;

function loop(){
  requestAnimationFrame(loop);
  if(!S.playing)return;
  const dt=Math.min(clock.getDelta(),0.05),time=clock.getElapsedTime();
  fc++;

  const spd=S.sprint?C.SPRINT:C.SPEED;
  const dir=new THREE.Vector3();
  if(!S.dialogActive){
    if(S.fwd)dir.z-=1;if(S.bwd)dir.z+=1;if(S.left)dir.x-=1;if(S.right)dir.x+=1;
  }
  dir.normalize();
  const rd=new THREE.Vector3(
    dir.x*Math.cos(camYaw)-dir.z*Math.sin(camYaw),0,
    dir.x*Math.sin(camYaw)+dir.z*Math.cos(camYaw));

  const np=cat.position.clone();np.x+=rd.x*spd*dt;np.z+=rd.z*spd*dt;
  if(!collide(np)){cat.position.x=np.x;cat.position.z=np.z;}
  else{
    const tx=cat.position.clone();tx.x=np.x;if(!collide(tx))cat.position.x=np.x;
    const tz=cat.position.clone();tz.z=np.z;if(!collide(tz))cat.position.z=np.z;
  }
  S.vel.y+=C.GRAV*dt;cat.position.y+=S.vel.y*dt;
  const gy=gndCheck(cat.position);
  if(gy!==null&&cat.position.y<=gy){cat.position.y=gy;S.vel.y=0;S.onGround=true}
  else if(cat.position.y<=0){cat.position.y=0;S.vel.y=0;S.onGround=true}
  else S.onGround=false;
  if(cat.position.y<-12){cat.position.set(0,2,0);S.vel.set(0,0,0)}

  if(dir.length()>0.1){
    const tgt=Math.atan2(rd.x,rd.z);
    let df=tgt-catBody.rotation.y;
    while(df>Math.PI)df-=6.28;while(df<-Math.PI)df+=6.28;
    catBody.rotation.y+=df*0.15;
  }
  catShad.position.set(cat.position.x,cat.position.y+0.01,cat.position.z);
  catShad.material.opacity=Math.max(0.05,0.2-cat.position.y*0.015);

  animCat(dt,dir.length()*spd);

  if(!S.meowing&&!S.scratching){
    const ms=dir.length()*spd;
    document.getElementById('cat-status').textContent=
      ms>10?'SPRINTING':ms>1?'EXPLORING':!S.onGround?'IN THE AIR':'IDLE';
  }

  const cp=cat.position.clone();cp.y+=0.5;camTgt.lerp(cp,0.1);
  const cd=3.8;
  camera.position.set(
    camTgt.x+Math.sin(camYaw)*Math.cos(camPitch)*cd,
    camTgt.y+Math.sin(-camPitch)*cd+1.8,
    camTgt.z+Math.cos(camYaw)*Math.cos(camPitch)*cd);
  camera.lookAt(camTgt);

  moon.position.set(cat.position.x+30,50,cat.position.z+15);
  moon.target.position.copy(cat.position);

  neonLights.forEach(n=>{
    n.light.intensity=n.base+Math.sin(time*7+n.ph)*0.25+Math.sin(time*13+n.ph*2)*0.1;
  });

  movPlats.forEach(p=>{
    const v=Math.sin(time*p.sp+p.ph)*p.rng;
    if(p.ax==='y'){p.mesh.position.y=p.oy+v;p.edge.position.y=p.oy+v+0.1}
    else{p.mesh.position.x=p.ox+v;p.edge.position.x=p.ox+v}
  });

  collectibles.forEach(c=>{
    if(c.userData.collected)return;
    c.children[0].rotation.y+=0.02;c.children[0].position.y=Math.sin(time*3+c.position.x)*0.12;
    if(cat.position.distanceTo(c.position)<1.3){
      c.userData.collected=true;c.visible=false;collectSfx();
      if(c.userData.type==='memory'){S.memories++;document.getElementById('mem-ct').textContent=S.memories+'/8'}
      else if(c.userData.type==='fish'){S.fish++;document.getElementById('fish-ct').textContent=S.fish}
      else{S.energy++;document.getElementById('nrg-ct').textContent=S.energy}
      if(S.memories>=8)document.getElementById('objective').textContent='✦ ALL MEMORIES FOUND — THE GATE IS OPEN ✦';
    }
  });

  if(fc%2===0){
    let near=null,nd=999;
    npcs.forEach(n=>{
      const d=cat.position.distanceTo(n.position);
      n.children[1].position.y=1.2+Math.sin(time*2+n.position.x)*0.02;
      if(d<6){const dr=new THREE.Vector3().subVectors(cat.position,n.position);dr.y=0;
        n.rotation.y+=(Math.atan2(dr.x,dr.z)-n.rotation.y)*0.04;}
      if(d<2.8&&d<nd){nd=d;near=n}
    });
    S.interactTarget=near;
    const pr=document.getElementById('interact-pr');
    if(near&&!S.dialogActive){pr.textContent=`[E] TALK TO ${near.userData.name}`;pr.classList.add('show')}
    else pr.classList.remove('show');
  }

  const rp=rain.geometry.attributes.position.array;
  for(let i=0;i<rp.length;i+=3){
    rp[i+1]-=dt*18;
    if(rp[i+1]<-1){rp[i+1]=25;rp[i]=cat.position.x+(Math.random()-0.5)*50;rp[i+2]=cat.position.z+(Math.random()-0.5)*50}
  }
  rain.geometry.attributes.position.needsUpdate=true;

  if(fc%3===0){
    const dp=dust.geometry.attributes.position.array;
    for(let i=0;i<dp.length;i+=3){dp[i]+=Math.sin(time+i)*0.003;dp[i+1]+=Math.sin(time*0.5+i*0.3)*0.004}
    dust.geometry.attributes.position.needsUpdate=true;
  }
  if(fc%5===0)drawMM();

  if(S.npcTalked.size>=2&&S.objIdx===0){S.objIdx=1;document.getElementById('objective').textContent=S.objectives[1]}
  if(S.memories>=3&&S.objIdx===1){S.objIdx=2;document.getElementById('objective').textContent=S.objectives[2]}
  if(S.npcTalked.size>=4&&S.objIdx===2){S.objIdx=3;document.getElementById('objective').textContent=S.objectives[3]}
  if(S.memories>=8&&S.objIdx<4){S.objIdx=4;document.getElementById('objective').textContent=S.objectives[4]}

  renderer.render(scene,camera);
}

// =============================================
// LOADING
// =============================================
const ldS=['BUILDING GEOMETRY...','PLACING NEON LIGHTS...','WAKING ROBOTS...','PIXEL IS STRETCHING...','CITY READY.'];
let lp=0;
const li=setInterval(()=>{
  lp+=Math.random()*18+6;if(lp>100)lp=100;
  document.getElementById('ld-bar').style.width=lp+'%';
  document.getElementById('ld-text').textContent=ldS[Math.min(Math.floor(lp/100*ldS.length),ldS.length-1)];
  if(lp>=100){clearInterval(li);setTimeout(()=>{
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('title-screen').classList.add('show');
  },400)}
},180);

document.getElementById('title-screen').addEventListener('click',()=>{
  initA();document.getElementById('title-screen').style.display='none';
  document.getElementById('hud').classList.add('show');S.playing=true;
  renderer.domElement.requestPointerLock();clock.start();
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

loop();
</script>
