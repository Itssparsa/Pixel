<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel the Cat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Patrick+Hand&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f0e8;overflow:hidden;height:100vh;width:100vw;font-family:'Quicksand',sans-serif;user-select:none}
  canvas{display:block}

  #stats{
    position:fixed;top:14px;left:14px;
    background:#f5f0e8ee;border:1.5px solid #2a2a2a;
    padding:8px 14px;font-size:13px;color:#2a2a2a;
    z-index:20;font-weight:600;display:flex;gap:14px;
  }

  #quests{
    position:fixed;top:14px;right:14px;width:230px;
    background:#f5f0e8ee;border:1.5px solid #2a2a2a;
    padding:12px;font-size:12px;color:#2a2a2a;z-index:20;
    max-height:52vh;overflow-y:auto;
  }
  #quests h3{font-size:16px;margin-bottom:6px;font-family:'Patrick Hand',cursive;letter-spacing:.5px}
  .qi{padding:5px 0;border-bottom:1px solid #e0dcd4;display:flex;align-items:flex-start;gap:5px;line-height:1.3}
  .qi.done{opacity:.3;text-decoration:line-through}
  .qi .dot{width:7px;height:7px;border-radius:50%;border:1.5px solid #2a2a2a;flex-shrink:0;margin-top:3px}

  #dlg{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    width:min(480px,86vw);background:#f5f0e8;border:1.5px solid #2a2a2a;
    padding:12px 16px;font-size:14px;color:#2a2a2a;z-index:30;display:none;line-height:1.4;
  }
  #dlg .sp{font-family:'Patrick Hand',cursive;font-weight:700;font-size:15px;margin-bottom:2px;color:#e85d4a}
  #dlg .pr{font-size:10px;color:#aaa;margin-top:5px;animation:bl 1s infinite}
  @keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}

  #minimap{position:fixed;bottom:14px;right:14px;width:130px;height:94px;background:#f5f0e8ee;border:1.5px solid #2a2a2a;z-index:20}

  #notif{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    background:#2a2a2a;color:#f5f0e8;padding:12px 24px;
    font-family:'Patrick Hand',cursive;font-size:18px;z-index:50;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);text-align:center;
  }
  #notif.show{transform:translate(-50%,-50%) scale(1)}

  #title{
    position:fixed;inset:0;background:#f5f0e8;z-index:100;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  }
  #title h1{font-family:'Patrick Hand',cursive;font-size:clamp(44px,9vw,80px);color:#2a2a2a;letter-spacing:-1px}
  #title .sub{font-size:clamp(13px,2.2vw,17px);color:#999;letter-spacing:1.5px}
  #pbtn{
    font-family:'Patrick Hand',cursive;font-size:20px;padding:10px 40px;
    background:#2a2a2a;color:#f5f0e8;border:none;cursor:pointer;transition:transform .1s;
  }
  #pbtn:hover{transform:scale(1.05)}
  .keys{font-size:12px;color:#bbb;text-align:center;max-width:340px;line-height:1.5}

  #abar{position:fixed;top:56px;left:50%;transform:translateX(-50%);width:180px;height:14px;background:#e8e4dc;border:1.5px solid #2a2a2a;z-index:25;display:none;overflow:hidden}
  #afill{width:0%;height:100%;background:#e85d4a;transition:width .15s}
  #albl{position:fixed;top:40px;left:50%;transform:translateX(-50%);font-size:11px;color:#2a2a2a;z-index:25;display:none;font-weight:600}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="title">
  <h1>PIXEL</h1>
  <div class="sub">a very naughty cat</div>
  <canvas id="tc" width="100" height="100"></canvas>
  <button id="pbtn">play</button>
  <div class="keys">WASD / arrows — move<br>E — interact / talk<br>Q — special (nap, pee, etc.)<br>SPACE — meow</div>
</div>

<div id="stats">
  <span id="sf">fish: 0</span>
  <span id="sq">quests: 0/10</span>
  <span id="sc">chaos: 0</span>
</div>
<div id="quests"><h3>to-do (naughty)</h3><div id="ql"></div></div>
<div id="dlg"><div class="sp"></div><div class="tx"></div><div class="pr">[ E ]</div></div>
<div id="albl"></div><div id="abar"><div id="afill"></div></div>
<canvas id="minimap"></canvas>
<div id="notif"></div>

<script>
const T=40,MW=55,MH=42,WW=MW*T,WH=MH*T;
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const mm=document.getElementById('minimap'),mc=mm.getContext('2d');
function rsz(){cv.width=innerWidth;cv.height=innerHeight;mm.width=130;mm.height=94}
rsz();addEventListener('resize',rsz);

const P={bg:'#f5f0e8',ink:'#2a2a2a',g1:'#d4dcc2',g2:'#cdd5ba',w1:'#a8c8d8',w2:'#90b8c8',
  sand:'#e0d4b0',path:'#d8cdb0',st:'#b0b0b0',std:'#888',wd:'#c0a070',wdd:'#a08050',
  r1:'#e85d4a',r2:'#4a8ec8',tr:'#8aaa78',trd:'#6a8a58',bu:'#7a9a68',
  fl:'#d8788a',fly:'#d8b868',flp:'#9878b8'};

// Map
const mp=[];for(let y=0;y<MH;y++){mp[y]=[];for(let x=0;x<MW;x++)mp[y][x]=0}
function F(x1,y1,x2,y2,v){for(let y=y1;y<=y2&&y<MH;y++)for(let x=x1;x<=x2&&x<MW;x++)if(y>=0&&x>=0)mp[y][x]=v}

// Lake
F(32,14,44,24,1);F(34,13,42,25,1);F(33,15,45,23,1);
// River
for(let y=24;y<MH;y++){const cx=38+Math.floor(Math.sin(y*.35)*2);F(cx-1,y,cx+1,y,1)}
// Sand
for(let y=11;y<=27;y++)for(let x=30;x<=47;x++)if(mp[y]&&mp[y][x]===0){let w=false;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)if(mp[y+dy]&&mp[y+dy][x+dx]===1)w=true;if(w)mp[y][x]=2}
// Paths
F(0,20,31,21,3);F(13,4,14,38,3);F(14,4,28,5,3);F(30,20,33,21,3);F(36,30,42,31,8);F(42,30,53,31,3);
// Forest
for(let y=33;y<41;y++)for(let x=1;x<13;x++)if(mp[y][x]===0){if(Math.random()<.35)mp[y][x]=5;else if(Math.random()<.12)mp[y][x]=7}
// Mountains
for(let y=0;y<4;y++)for(let x=18;x<32;x++)if(Math.random()<.45)mp[y][x]=4;else if(Math.random()<.25)mp[y][x]=7;
// Meadow flowers
for(let y=27;y<40;y++)for(let x=44;x<53;x++)if(mp[y][x]===0&&Math.random()<.12)mp[y][x]=6;
// Scatter
for(let y=0;y<MH;y++)for(let x=0;x<MW;x++)if(mp[y][x]===0){if(Math.random()<.015)mp[y][x]=5;if(Math.random()<.02)mp[y][x]=6}
// Border
for(let x=0;x<MW;x++){mp[0][x]=5;mp[MH-1][x]=5}
for(let y=0;y<MH;y++){mp[y][0]=5;mp[y][MW-1]=5}

// Buildings
const bl=[
  {x:7,y:16,w:5,h:4,c:'r1',n:'fish shop'},
  {x:17,y:16,w:5,h:4,c:'r2',n:'town hall'},
  {x:7,y:23,w:4,h:3,c:'r1',n:'café'},
  {x:18,y:23,w:5,h:4,c:'r2',n:'library'},
  {x:23,y:7,w:5,h:4,c:'r1',n:'mountain hut'},
];
bl.forEach(b=>{F(b.x,b.y,b.x+b.w-1,b.y+b.h-1,4);mp[b.y+b.h-1][b.x+Math.floor(b.w/2)]=9});

function solid(tx,ty){if(tx<0||ty<0||tx>=MW||ty>=MH)return true;const t=mp[ty][tx];return t===1||t===4||t===5}

// NPCs
const npcs=[
  {x:9,y:20,nm:'Old Tom',lines:['back in my day we had REAL yarn...','now get off my lawn.'],spr:'old',aLv:0,aMax:6,mad:false},
  {x:19,y:20,nm:'Mayor Fluff',lines:['as mayor, i decree: more naps!','also stop knocking stuff off my desk.'],spr:'mayor',aLv:0,aMax:5,mad:false},
  {x:9,y:25,nm:'Barista Bean',lines:['one fish latte, coming up!','...why are you staring at me?'],spr:'bari',aLv:0,aMax:4,mad:false},
  {x:21,y:26,nm:'Librarian Mochi',lines:['shh! this is a library!','if you knock ONE more book off...'],spr:'lib',aLv:0,aMax:3,mad:false},
  {x:45,y:31,nm:'Farmer Patches',lines:['stop digging in my garden, Pixel!','i just planted those!!'],spr:'farm',aLv:0,aMax:5,mad:false},
];

// Quests
const Q=[
  {id:'annoy_lib',t:'annoy the librarian until she loses it',done:false,cl:'#e85d4a',tgt:'Librarian Mochi'},
  {id:'annoy_mayor',t:'pester the mayor until he rages',done:false,cl:'#d8788a',tgt:'Mayor Fluff'},
  {id:'pee',t:'pee on 3 flower patches',done:false,cl:'#d8b868',ct:0,nd:3},
  {id:'yeet',t:'push 3 fish into the lake',done:false,cl:'#a8c8d8',ct:0,nd:3,
    items:[{x:35,y:13,sp:'fishp'},{x:46,y:18,sp:'fishp'},{x:33,y:25,sp:'fishp'}]},
  {id:'nap',t:'nap in 4 forbidden spots',done:false,cl:'#9878b8',ct:0,nd:4,
    items:[{x:20,y:19,sp:'zzz'},{x:9,y:17,sp:'zzz'},{x:25,y:9,sp:'zzz'},{x:22,y:26,sp:'zzz'}]},
  {id:'steal',t:'steal 3 fish from the shop',done:false,cl:'#e8a848',ct:0,nd:3,
    items:[{x:8,y:19,sp:'sfish'},{x:10,y:19,sp:'sfish'},{x:11,y:18,sp:'sfish'}]},
  {id:'knock',t:'knock 4 things off tables',done:false,cl:'#b0b0b0',ct:0,nd:4,
    items:[{x:19,y:18,sp:'vase'},{x:9,y:24,sp:'cup'},{x:20,y:24,sp:'book'},{x:24,y:9,sp:'vase'}]},
  {id:'meow',t:'meow 15 times (be obnoxious)',done:false,cl:'#c0a070',ct:0,nd:15},
  {id:'scare',t:'scare 4 birds by yelling',done:false,cl:'#6a8a58',ct:0,nd:4},
  {id:'explore',t:'wander into all 5 areas',done:false,cl:'#999',
    vis:{village:false,lake:false,forest:false,mountain:false,meadow:false}},
];

let coll=[];
function initC(){
  coll=[];
  Q.forEach(q=>{if(q.items)q.items.forEach(it=>coll.push({...it,qid:q.id,got:false}))});
  [{x:46,y:28},{x:48,y:33},{x:50,y:36}].forEach(p=>coll.push({...p,sp:'pee',qid:'pee',got:false}));
}
initC();

const birds=[{x:5,y:35,s:false,t:0},{x:8,y:38,s:false,t:0},{x:11,y:36,s:false,t:0},{x:46,y:33,s:false,t:0},{x:28,y:8,s:false,t:0}];

// Player
const pl={x:13*T+T/2,y:21*T+T/2,spd:180,dir:0,mv:false,fish:0,meows:0,chaos:0,
  nap:false,napT:0,pee:false,peeT:0};
const cam={x:0,y:0};
const ks={};
addEventListener('keydown',e=>{
  ks[e.key.toLowerCase()]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key))e.preventDefault();
  if(e.key===' '&&gs==='play')doMeow();
  if(e.key.toLowerCase()==='e'&&gs==='play')doE();
  if(e.key.toLowerCase()==='q'&&gs==='play')doQ();
});
addEventListener('keyup',e=>{ks[e.key.toLowerCase()]=false});

let gs='title',dlgQ=[],curD=null,mP=[],sP=[],nT=0,tm=0,aBarT=0;

// Title cat
const tc=document.getElementById('tc'),tx2=tc.getContext('2d');
function dtc(){tx2.clearRect(0,0,100,100);drawCat(tx2,50,55,2,0);requestAnimationFrame(dtc)}
dtc();
document.getElementById('pbtn').onclick=()=>{document.getElementById('title').style.display='none';gs='play';uQUI();requestAnimationFrame(loop)};

// Draw cat
function drawCat(c,x,y,s,dir){
  c.save();c.translate(x,y);c.lineCap='round';c.lineJoin='round';
  // Tail
  c.strokeStyle=P.ink;c.lineWidth=1.8*s;
  c.beginPath();c.moveTo(-7*s,4*s);
  c.bezierCurveTo(-12*s,-1*s+Math.sin(tm*4)*2.5*s,-14*s+Math.sin(tm*3)*2*s,-7*s,-9*s,-12*s);c.stroke();
  // Body
  c.fillStyle=P.bg;c.strokeStyle=P.ink;c.lineWidth=1.8*s;
  c.beginPath();c.ellipse(0,2*s,8*s,6*s,0,0,Math.PI*2);c.fill();c.stroke();
  // Spot on body
  c.fillStyle='#e0d8cc';
  c.beginPath();c.ellipse(3*s,1*s,3*s,2.5*s,0.3,0,Math.PI*2);c.fill();
  // Head
  c.fillStyle=P.bg;
  c.beginPath();c.ellipse(0,-6*s,7*s,6*s,0,0,Math.PI*2);c.fill();c.stroke();
  // Ears
  c.beginPath();c.moveTo(-4*s,-10*s);c.lineTo(-7*s,-18*s);c.lineTo(0,-12*s);c.closePath();c.fill();c.stroke();
  c.beginPath();c.moveTo(4*s,-10*s);c.lineTo(7*s,-18*s);c.lineTo(0,-12*s);c.closePath();c.fill();c.stroke();
  c.fillStyle='#e8c8c0';
  c.beginPath();c.moveTo(-3.5*s,-11*s);c.lineTo(-5.8*s,-16.5*s);c.lineTo(-.5*s,-12.5*s);c.closePath();c.fill();
  c.beginPath();c.moveTo(3.5*s,-11*s);c.lineTo(5.8*s,-16.5*s);c.lineTo(.5*s,-12.5*s);c.closePath();c.fill();
  // Eyes
  const blink=Math.sin(tm*1.8)>.96;
  if(pl.nap){
    c.strokeStyle=P.ink;c.lineWidth=1.2*s;
    c.beginPath();c.moveTo(-4.5*s,-7*s);c.lineTo(-1.5*s,-6*s);c.stroke();
    c.beginPath();c.moveTo(4.5*s,-7*s);c.lineTo(1.5*s,-6*s);c.stroke();
  }else if(blink){
    c.strokeStyle=P.ink;c.lineWidth=1.2*s;
    c.beginPath();c.moveTo(-4.5*s,-7*s);c.lineTo(-2.5*s,-6*s);c.lineTo(-4.5*s,-5*s);c.stroke();
    c.beginPath();c.moveTo(4.5*s,-7*s);c.lineTo(2.5*s,-6*s);c.lineTo(4.5*s,-5*s);c.stroke();
  }else{
    c.fillStyle=P.ink;
    c.beginPath();c.ellipse(-3*s,-6.5*s,1.6*s,2*s,0,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(3*s,-6.5*s,1.6*s,2*s,0,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';
    c.beginPath();c.arc(-2.4*s,-7.2*s,.6*s,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(3.6*s,-7.2*s,.6*s,0,Math.PI*2);c.fill();
  }
  // Nose
  c.fillStyle='#d8788a';
  c.beginPath();c.moveTo(0,-4*s);c.lineTo(-1*s,-2.8*s);c.lineTo(1*s,-2.8*s);c.fill();
  // Mouth
  c.strokeStyle=P.ink;c.lineWidth=1*s;
  c.beginPath();c.moveTo(0,-2.8*s);c.quadraticCurveTo(-2*s,-.8*s,-3.5*s,-1.5*s);c.stroke();
  c.beginPath();c.moveTo(0,-2.8*s);c.quadraticCurveTo(2*s,-.8*s,3.5*s,-1.5*s);c.stroke();
  // Whiskers
  c.lineWidth=.6*s;
  c.beginPath();c.moveTo(-4*s,-4*s);c.lineTo(-11*s,-5.5*s);c.stroke();
  c.beginPath();c.moveTo(-4*s,-2.5*s);c.lineTo(-11*s,-1*s);c.stroke();
  c.beginPath();c.moveTo(4*s,-4*s);c.lineTo(11*s,-5.5*s);c.stroke();
  c.beginPath();c.moveTo(4*s,-2.5*s);c.lineTo(11*s,-1*s);c.stroke();
  // Legs
  const lo=pl.mv?Math.sin(tm*10)*2.2*s:0;
  c.strokeStyle=P.ink;c.lineWidth=1.8*s;
  c.beginPath();c.moveTo(-3.5*s,7*s);c.lineTo(-4.5*s,12*s+lo);c.stroke();
  c.beginPath();c.moveTo(-1*s,7*s);c.lineTo(-1*s,12*s-lo);c.stroke();
  c.beginPath();c.moveTo(1*s,7*s);c.lineTo(1*s,12*s+lo);c.stroke();
  c.beginPath();c.moveTo(3.5*s,7*s);c.lineTo(4.5*s,12*s-lo);c.stroke();
  // Pee anim
  if(pl.pee){
    c.strokeStyle='#d8b868';c.lineWidth=1.2*s;
    const pL=Math.min(pl.peeT*18,10)*s;
    c.beginPath();c.moveTo(5*s,6*s);c.quadraticCurveTo(8*s,6*s+pL*.5,9*s,6*s+pL);c.stroke();
    if(pl.peeT>.3){c.fillStyle='rgba(216,184,104,0.25)';c.beginPath();c.ellipse(9*s,6*s+pL+1*s,pL*.5,pL*.2,0,0,Math.PI*2);c.fill()}
  }
  c.restore();
}

// NPC draw
function dNPC(c,n,x,y){
  const s=1;c.save();c.translate(x,y);
  const col=n.spr==='old'?'#c8c0a8':n.spr==='mayor'?'#c8b0d8':n.spr==='bari'?'#b09070':n.spr==='lib'?'#a0b8d0':'#90b890';
  c.fillStyle=col;c.strokeStyle=P.ink;c.lineWidth=1.5;
  c.beginPath();c.ellipse(0,2*s,7*s,5.5*s,0,0,Math.PI*2);c.fill();c.stroke();
  c.beginPath();c.ellipse(0,-6*s,6*s,5.5*s,0,0,Math.PI*2);c.fill();c.stroke();
  // Ears
  c.beginPath();c.moveTo(-3.5*s,-10*s);c.lineTo(-6*s,-16*s);c.lineTo(.5*s,-11*s);c.closePath();c.fill();c.stroke();
  c.beginPath();c.moveTo(3.5*s,-10*s);c.lineTo(6*s,-16*s);c.lineTo(-.5*s,-11*s);c.closePath();c.fill();c.stroke();
  // Eyes
  if(n.mad){
    c.strokeStyle=P.ink;c.lineWidth=1.8;
    c.beginPath();c.moveTo(-5*s,-8*s);c.lineTo(-2*s,-6*s);c.lineTo(-5*s,-4.5*s);c.stroke();
    c.beginPath();c.moveTo(5*s,-8*s);c.lineTo(2*s,-6*s);c.lineTo(5*s,-4.5*s);c.stroke();
    // Anger vein
    c.strokeStyle='#e85d4a';c.lineWidth=1.8;
    c.beginPath();c.moveTo(7*s,-14*s);c.lineTo(11*s,-14*s);c.stroke();
    c.beginPath();c.moveTo(9*s,-16*s);c.lineTo(9*s,-12*s);c.stroke();
  }else{
    c.fillStyle=P.ink;
    c.beginPath();c.arc(-2.5*s,-6*s,1.3,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(2.5*s,-6*s,1.3,0,Math.PI*2);c.fill();
  }
  // Crown for mayor
  if(n.spr==='mayor'){
    c.fillStyle='#d8b868';c.strokeStyle=P.ink;c.lineWidth=1;
    c.beginPath();c.moveTo(-4*s,-14*s);c.lineTo(-5*s,-19*s);c.lineTo(-1.5*s,-16.5*s);c.lineTo(0,-20*s);c.lineTo(1.5*s,-16.5*s);c.lineTo(5*s,-19*s);c.lineTo(4*s,-14*s);c.closePath();c.fill();c.stroke();
  }
  // Glasses for old
  if(n.spr==='old'){c.strokeStyle='#666';c.lineWidth=1;c.beginPath();c.arc(-2.5*s,-6*s,2.5,0,Math.PI*2);c.stroke();c.beginPath();c.arc(2.5*s,-6*s,2.5,0,Math.PI*2);c.stroke()}
  // Name
  c.fillStyle=P.ink;c.font='10px Quicksand';c.textAlign='center';c.fillText(n.nm,0,-20*s);
  // Prompt
  const d=Math.hypot(pl.x-(n.x*T+T/2),pl.y-(n.y*T+T/2));
  if(d<T*2.5){const bob=Math.sin(tm*4)*2;c.fillStyle=P.ink;c.font='bold 10px Quicksand';c.fillText('[E]',0,-26*s+bob)}
  c.restore();
}

// Tile render
function dTile(c,tx,ty,sx,sy){
  const t=mp[ty][tx];
  if(t===0){c.fillStyle=(tx+ty)%2?P.g1:P.g2;c.fillRect(sx,sy,T,T)}
  else if(t===1){c.fillStyle=Math.sin(tm*2+tx*.5+ty*.3)>.1?P.w1:P.w2;c.fillRect(sx,sy,T,T);c.strokeStyle='rgba(255,255,255,.15)';c.lineWidth=.6;const wy=sy+16+Math.sin(tm*2+tx)*5;c.beginPath();c.moveTo(sx,wy);c.quadraticCurveTo(sx+T/2,wy-3,sx+T,wy);c.stroke()}
  else if(t===2){c.fillStyle=P.sand;c.fillRect(sx,sy,T,T)}
  else if(t===3){c.fillStyle=P.path;c.fillRect(sx,sy,T,T);c.strokeStyle='#c8b890';c.lineWidth=.4;c.setLineDash([3,3]);c.beginPath();c.moveTo(sx,sy+T/2);c.lineTo(sx+T,sy+T/2);c.stroke();c.setLineDash([])}
  else if(t===4){c.fillStyle=P.st;c.fillRect(sx,sy,T,T);c.strokeStyle=P.std;c.lineWidth=.8;c.strokeRect(sx+2,sy+2,T-4,T-4)}
  else if(t===5){c.fillStyle=(tx+ty)%2?P.g1:P.g2;c.fillRect(sx,sy,T,T);c.fillStyle=P.wd;c.strokeStyle=P.ink;c.lineWidth=1;c.fillRect(sx+T/2-2.5,sy+T/2,5,T/2);c.strokeRect(sx+T/2-2.5,sy+T/2,5,T/2);c.fillStyle=P.tr;c.strokeStyle=P.trd;c.beginPath();c.arc(sx+T/2,sy+T/3,11,0,Math.PI*2);c.fill();c.stroke()}
  else if(t===6){c.fillStyle=(tx+ty)%2?P.g1:P.g2;c.fillRect(sx,sy,T,T);c.strokeStyle=P.trd;c.lineWidth=.8;c.beginPath();c.moveTo(sx+T/2,sy+T);c.lineTo(sx+T/2,sy+T/2);c.stroke();const fc=[P.fl,P.fly,P.flp][(tx*3+ty)%3];c.fillStyle=fc;c.beginPath();c.arc(sx+T/2,sy+T/2-2,4,0,Math.PI*2);c.fill();c.strokeStyle=P.ink;c.lineWidth=.6;c.stroke()}
  else if(t===7){c.fillStyle=(tx+ty)%2?P.g1:P.g2;c.fillRect(sx,sy,T,T);c.fillStyle=P.bu;c.strokeStyle=P.trd;c.lineWidth=.8;c.beginPath();c.ellipse(sx+T/2,sy+T/2+2,10,7,0,0,Math.PI*2);c.fill();c.stroke()}
  else if(t===8){c.fillStyle=P.w1;c.fillRect(sx,sy,T,T);c.fillStyle=P.wd;c.strokeStyle=P.wdd;c.lineWidth=.8;c.fillRect(sx,sy+3,T,T-6);c.strokeRect(sx,sy+3,T,T-6);c.beginPath();c.moveTo(sx+T/3,sy+3);c.lineTo(sx+T/3,sy+T-3);c.stroke();c.beginPath();c.moveTo(sx+T*2/3,sy+3);c.lineTo(sx+T*2/3,sy+T-3);c.stroke()}
  else if(t===9){c.fillStyle=P.st;c.fillRect(sx,sy,T,T);c.fillStyle=P.wd;c.strokeStyle=P.ink;c.lineWidth=1.2;c.fillRect(sx+8,sy+3,T-16,T-3);c.strokeRect(sx+8,sy+3,T-16,T-3)}
}

function dRoof(c,b){
  const bx=b.x*T-cam.x,by=b.y*T-cam.y,bw=b.w*T;
  c.fillStyle=P[b.c];c.strokeStyle=P.ink;c.lineWidth=1.5;
  c.beginPath();c.moveTo(bx-3,by);c.lineTo(bx+bw/2,by-16);c.lineTo(bx+bw+3,by);c.closePath();c.fill();c.stroke();
  c.font='10px Quicksand';c.fillStyle=P.ink;c.textAlign='center';c.fillText(b.n,bx+bw/2,by+8);
}

// Item draw
function dItem(c,it,x,y){
  if(it.got)return;
  const bob=Math.sin(tm*3+it.x)*2.5;
  c.save();c.translate(x,y+bob);
  if(it.sp==='fishp'){
    c.fillStyle='#d8b868';c.strokeStyle=P.ink;c.lineWidth=1.2;
    c.beginPath();c.ellipse(0,-3,7,4,0,0,Math.PI*2);c.fill();c.stroke();
    c.beginPath();c.moveTo(7,-3);c.lineTo(11,-7);c.lineTo(11,1);c.closePath();c.fill();c.stroke();
    c.fillStyle=P.ink;c.beginPath();c.arc(-2,-4,1,0,Math.PI*2);c.fill();
  }else if(it.sp==='zzz'){
    c.fillStyle='rgba(152,120,184,.18)';c.beginPath();c.arc(0,-2,12,0,Math.PI*2);c.fill();
    c.font='14px Patrick Hand';c.fillStyle='#9878b8';c.textAlign='center';c.fillText('zzz',0,2);
  }else if(it.sp==='sfish'){
    c.fillStyle='#e8a848';c.strokeStyle=P.ink;c.lineWidth=1.2;
    c.beginPath();c.ellipse(0,-3,6,3.5,0,0,Math.PI*2);c.fill();c.stroke();
    c.beginPath();c.moveTo(6,-3);c.lineTo(9,-6);c.lineTo(9,0);c.closePath();c.fill();c.stroke();
    c.fillStyle='#d8b868';c.globalAlpha=.4+Math.sin(tm*4)*.4;c.beginPath();c.arc(3,-7,1.5,0,Math.PI*2);c.fill();c.globalAlpha=1;
  }else if(it.sp==='vase'||it.sp==='cup'||it.sp==='book'){
    c.fillStyle=it.sp==='vase'?'#c8a0a0':it.sp==='cup'?'#a0b8c8':'#c8b090';
    c.strokeStyle=P.ink;c.lineWidth=1.2;
    if(it.sp==='book'){c.fillRect(-6,-6,12,8);c.strokeRect(-6,-6,12,8)}
    else{c.beginPath();c.ellipse(0,-2,4,6,0,0,Math.PI*2);c.fill();c.stroke()}
  }else if(it.sp==='pee'){
    c.fillStyle='rgba(216,184,104,.12)';c.beginPath();c.arc(0,0,10,0,Math.PI*2);c.fill();
    c.font='12px Patrick Hand';c.fillStyle='#c8b068';c.textAlign='center';c.fillText('~flower~',0,4);
  }
  // Prompt
  const d=Math.hypot(pl.x-(it.x*T+T/2),pl.y-(it.y*T+T/2));
  if(d<T*2){
    c.fillStyle=P.ink;c.font='bold 9px Quicksand';c.textAlign='center';
    const act=it.sp==='pee'?'[Q] pee':it.sp==='zzz'?'[Q] nap':'[E]';
    c.fillText(act,0,-16);
  }
  c.restore();
}

function dBird(c,b,x,y){
  if(b.s)return;
  const hop=Math.sin(tm*5+b.x)*1.2;
  c.save();c.translate(x,y+hop);
  c.fillStyle='#777';c.strokeStyle=P.ink;c.lineWidth=.8;
  c.beginPath();c.ellipse(0,-2,3.5,2.5,0,0,Math.PI*2);c.fill();c.stroke();
  c.fillStyle='#d8b868';c.beginPath();c.moveTo(3.5,-3);c.lineTo(6,-2);c.lineTo(3.5,-1);c.fill();
  c.restore();
}

// Meow
function doMeow(){
  if(curD||pl.nap||pl.pee)return;
  pl.meows++;pl.chaos++;updS();
  for(let i=0;i<3;i++)mP.push({x:pl.x,y:pl.y-16,vx:(Math.random()-.5)*50,vy:-25-Math.random()*35,life:1,
    t:['meow!','MEW!!','mrow!','HISS!','nya~','REOW!','MRRP!'][Math.floor(Math.random()*7)]});
  // Scare birds
  birds.forEach(b=>{if(b.s)return;const d=Math.hypot(pl.x-(b.x*T+T/2),pl.y-(b.y*T+T/2));
    if(d<T*3.5){b.s=true;b.t=6;const q=Q.find(q=>q.id==='scare');if(q&&!q.done){q.ct++;if(q.ct>=q.nd)comp(q);uQUI()}
      for(let i=0;i<3;i++)sP.push({x:b.x*T+T/2,y:b.y*T,vx:(Math.random()-.5)*40,vy:-50-Math.random()*25,life:1,c:'#777'})}});
  // Annoy nearby
  npcs.forEach(n=>{const d=Math.hypot(pl.x-(n.x*T+T/2),pl.y-(n.y*T+T/2));
    if(d<T*3){n.aLv=Math.min(n.aLv+.6,n.aMax);if(n.aLv>=n.aMax&&!n.mad){n.mad=true;chkAnnoy(n)}}});
  const mq=Q.find(q=>q.id==='meow');if(mq&&!mq.done){mq.ct=pl.meows;if(mq.ct>=mq.nd)comp(mq);uQUI()}
}

function doE(){
  if(pl.nap||pl.pee)return;
  if(curD){curD=null;if(dlgQ.length)curD=dlgQ.shift(),sDlg(curD.s,curD.t);else document.getElementById('dlg').style.display='none';return}
  for(const n of npcs){const d=Math.hypot(pl.x-(n.x*T+T/2),pl.y-(n.y*T+T/2));
    if(d<T*2.5){
      n.aLv=Math.min(n.aLv+1.2,n.aMax);uABar(n);
      if(n.aLv>=n.aMax&&!n.mad){
        n.mad=true;
        const al=['PIXEL!! STOP IT RIGHT NOW!!','i swear to cod... ONE more time...','THAT\'S IT. i am DONE with you.','you are THE WORST cat. THE. WORST.'];
        dlgQ=al.slice(1).map(l=>({s:n.nm,t:l}));curD={s:n.nm,t:al[0]};sDlg(n.nm,al[0]);
        chkAnnoy(n);pl.chaos+=5;updS();return;
      }
      const li=n.mad?['go AWAY, Pixel.','i am NOT talking to you.','...','*ignores you*']:n.lines;
      dlgQ=li.slice(1).map(l=>({s:n.nm,t:l}));curD={s:n.nm,t:li[0]};sDlg(n.nm,li[0]);return;
    }
  }
  for(const it of coll){if(it.got)continue;const d=Math.hypot(pl.x-(it.x*T+T/2),pl.y-(it.y*T+T/2));
    if(d<T*2){if(it.sp==='pee'||it.sp==='zzz')return;colIt(it);return}}
}

function doQ(){
  if(curD||pl.nap||pl.pee)return;
  for(const it of coll){if(it.got)continue;const d=Math.hypot(pl.x-(it.x*T+T/2),pl.y-(it.y*T+T/2));
    if(d<T*2){
      if(it.sp==='zzz'){
        pl.nap=true;pl.napT=0;it.got=true;
        const q=Q.find(q=>q.id==='nap');if(q&&!q.done){q.ct++;if(q.ct>=q.nd)comp(q);else sNotif('illegal nap '+q.ct+'/'+q.nd);uQUI()}
        pl.chaos+=2;updS();
        for(let i=0;i<4;i++)sP.push({x:pl.x,y:pl.y-10,vx:(Math.random()-.5)*25,vy:-15-Math.random()*15,life:1.5,c:'#9878b8'});return;
      }
      if(it.sp==='pee'){
        pl.pee=true;pl.peeT=0;it.got=true;
        const q=Q.find(q=>q.id==='pee');if(q&&!q.done){q.ct++;if(q.ct>=q.nd)comp(q);else sNotif('territory marked '+q.ct+'/'+q.nd);uQUI()}
        pl.chaos+=3;updS();return;
      }
    }
  }
}

function colIt(it){
  it.got=true;pl.chaos++;updS();
  for(let i=0;i<5;i++)sP.push({x:it.x*T+T/2,y:it.y*T,vx:(Math.random()-.5)*60,vy:(Math.random()-.5)*60,life:1,c:'#d8b868'});
  if(it.sp==='fishp'){const q=Q.find(q=>q.id==='yeet');if(q&&!q.done){q.ct++;if(q.ct>=q.nd)comp(q);else sNotif('yeet! '+q.ct+'/'+q.nd);uQUI()}}
  else if(it.sp==='sfish'){pl.fish++;updS();const q=Q.find(q=>q.id==='steal');if(q&&!q.done){q.ct++;if(q.ct>=q.nd)comp(q);else sNotif('stolen! '+q.ct+'/'+q.nd);uQUI()}}
  else if(it.sp==='vase'||it.sp==='cup'||it.sp==='book'){const q=Q.find(q=>q.id==='knock');if(q&&!q.done){q.ct++;if(q.ct>=q.nd)comp(q);else sNotif('CRASH! '+q.ct+'/'+q.nd);uQUI()}
    mP.push({x:it.x*T+T/2,y:it.y*T-8,vx:0,vy:-30,life:1.5,t:'*CRASH*'})}
}

function chkAnnoy(n){
  if(n.nm==='Librarian Mochi'){const q=Q.find(q=>q.id==='annoy_lib');if(q&&!q.done)comp(q)}
  if(n.nm==='Mayor Fluff'){const q=Q.find(q=>q.id==='annoy_mayor');if(q&&!q.done)comp(q)}
}

function comp(q){if(q.done)return;q.done=true;sNotif('✓ '+q.t);
  const dn=Q.filter(q=>q.done).length;document.getElementById('sq').textContent='quests: '+dn+'/'+Q.length;uQUI();
  if(dn===Q.length)setTimeout(()=>sNotif('ALL DONE — Pixel is the worst cat alive.'),2e3)}

function sDlg(s,t){const d=document.getElementById('dlg');d.style.display='block';d.querySelector('.sp').textContent=s;d.querySelector('.tx').textContent=t}
function sNotif(t){const e=document.getElementById('notif');e.textContent=t;e.classList.add('show');nT=2.2}
function updS(){document.getElementById('sf').textContent='fish: '+pl.fish;document.getElementById('sc').textContent='chaos: '+pl.chaos}

function uABar(n){
  document.getElementById('abar').style.display='block';document.getElementById('albl').style.display='block';
  document.getElementById('afill').style.width=(n.aLv/n.aMax*100)+'%';
  document.getElementById('albl').textContent=n.nm+' annoyance';aBarT=2;
}

function uQUI(){
  const l=document.getElementById('ql');l.innerHTML='';
  Q.forEach(q=>{const d=document.createElement('div');d.className='qi'+(q.done?' done':'');
    const dot=document.createElement('div');dot.className='dot';dot.style.background=q.done?'#ddd':q.cl;d.appendChild(dot);
    let t=q.t;if(q.nd&&!q.done)t+=' ('+(q.ct||0)+'/'+q.nd+')';d.appendChild(document.createTextNode(t));l.appendChild(d)});
}

function chkReg(){
  const tx=Math.floor(pl.x/T),ty=Math.floor(pl.y/T);
  const eq=Q.find(q=>q.id==='explore');if(!eq||eq.done)return;
  if(tx>=5&&tx<=24&&ty>=14&&ty<=28)eq.vis.village=true;
  if(tx>=30&&tx<=46&&ty>=11&&ty<=27)eq.vis.lake=true;
  if(tx>=1&&tx<=13&&ty>=32&&ty<=41)eq.vis.forest=true;
  if(tx>=18&&tx<=32&&ty>=0&&ty<=7)eq.vis.mountain=true;
  if(tx>=43&&tx<=53&&ty>=27&&ty<=40)eq.vis.meadow=true;
  if(Object.values(eq.vis).every(v=>v))comp(eq);
}

function dMM(){
  mc.fillStyle=P.bg;mc.fillRect(0,0,130,94);
  const sx=130/MW,sy=94/MH;
  for(let y=0;y<MH;y++)for(let x=0;x<MW;x++){const t=mp[y][x];if(!t)continue;
    mc.fillStyle=t===1?P.w1:t===2?P.sand:t===3?P.path:t===4?P.st:t===5?P.tr:t===6?P.fl:t===7?P.bu:P.wd;
    mc.fillRect(x*sx,y*sy,Math.ceil(sx),Math.ceil(sy))}
  mc.fillStyle='#e85d4a';mc.beginPath();mc.arc((pl.x/WW)*130,(pl.y/WH)*94,2.5,0,Math.PI*2);mc.fill();
  coll.forEach(it=>{if(it.got)return;mc.fillStyle='#d8b868';mc.beginPath();mc.arc(it.x*sx+sx/2,it.y*sy+sy/2,1.2,0,Math.PI*2);mc.fill()});
  mc.strokeStyle=P.ink;mc.lineWidth=.8;mc.strokeRect((cam.x/WW)*130,(cam.y/WH)*94,(cv.width/WW)*130,(cv.height/WH)*94);
}

// Loop
let lt=0;
function loop(ts){
  const dt=Math.min((ts-lt)/1e3,.05);lt=ts;tm+=dt;if(gs!=='play')return;

  if(pl.nap){pl.napT+=dt;if(pl.napT>2.2)pl.nap=false}
  if(pl.pee){pl.peeT+=dt;if(pl.peeT>1.3)pl.pee=false}

  let mx=0,my=0;
  if(!pl.nap&&!pl.pee){
    if(ks['w']||ks['arrowup'])my=-1;if(ks['s']||ks['arrowdown'])my=1;
    if(ks['a']||ks['arrowleft'])mx=-1;if(ks['d']||ks['arrowright'])mx=1;
  }
  pl.mv=mx!==0||my!==0;if(mx&&my){mx*=.707;my*=.707}
  if(pl.mv){if(my>0)pl.dir=0;if(mx<0)pl.dir=1;if(my<0)pl.dir=2;if(mx>0)pl.dir=3}
  const nx=pl.x+mx*pl.spd*dt,ny=pl.y+my*pl.spd*dt,r=7;
  if(!solid(Math.floor((nx-r)/T),Math.floor(pl.y/T))&&!solid(Math.floor((nx+r)/T),Math.floor(pl.y/T)))pl.x=nx;
  if(!solid(Math.floor(pl.x/T),Math.floor((ny-r)/T))&&!solid(Math.floor(pl.x/T),Math.floor((ny+r)/T)))pl.y=ny;
  pl.x=Math.max(T,Math.min(WW-T,pl.x));pl.y=Math.max(T,Math.min(WH-T,pl.y));

  cam.x+=(pl.x-cv.width/2-cam.x)*5*dt;cam.y+=(pl.y-cv.height/2-cam.y)*5*dt;
  cam.x=Math.max(0,Math.min(WW-cv.width,cam.x));cam.y=Math.max(0,Math.min(WH-cv.height,cam.y));

  chkReg();
  mP.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=45*dt;p.life-=dt*1.5});mP=mP.filter(p=>p.life>0);
  sP.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*2});sP=sP.filter(p=>p.life>0);
  birds.forEach(b=>{if(b.s){b.t-=dt;if(b.t<=0)b.s=false}});
  npcs.forEach(n=>{if(!n.mad&&n.aLv>0)n.aLv=Math.max(0,n.aLv-dt*.25)});
  if(nT>0){nT-=dt;if(nT<=0)document.getElementById('notif').classList.remove('show')}
  if(aBarT>0){aBarT-=dt;if(aBarT<=0){document.getElementById('abar').style.display='none';document.getElementById('albl').style.display='none'}}

  // Render
  cx.clearRect(0,0,cv.width,cv.height);cx.fillStyle=P.bg;cx.fillRect(0,0,cv.width,cv.height);
  const stx=Math.max(0,Math.floor(cam.x/T)-1),sty=Math.max(0,Math.floor(cam.y/T)-1);
  const etx=Math.min(MW,Math.ceil((cam.x+cv.width)/T)+1),ety=Math.min(MH,Math.ceil((cam.y+cv.height)/T)+1);
  for(let ty=sty;ty<ety;ty++)for(let tx=stx;tx<etx;tx++)dTile(cx,tx,ty,tx*T-cam.x,ty*T-cam.y);
  bl.forEach(b=>dRoof(cx,b));

  // Depth sorted entities
  const ents=[];
  coll.forEach(it=>{if(!it.got)ents.push({tp:'i',d:it,y:it.y*T})});
  birds.forEach(b=>{if(!b.s)ents.push({tp:'b',d:b,y:b.y*T})});
  npcs.forEach(n=>ents.push({tp:'n',d:n,y:n.y*T}));
  ents.push({tp:'p',y:pl.y});
  ents.sort((a,b)=>a.y-b.y);

  ents.forEach(e=>{
    if(e.tp==='i'){const sx=e.d.x*T+T/2-cam.x,sy=e.d.y*T+T/2-cam.y;if(sx>-40&&sx<cv.width+40&&sy>-40&&sy<cv.height+40)dItem(cx,e.d,sx,sy)}
    else if(e.tp==='b'){const sx=e.d.x*T+T/2-cam.x,sy=e.d.y*T+T/2-cam.y;if(sx>-40&&sx<cv.width+40)dBird(cx,e.d,sx,sy)}
    else if(e.tp==='n'){const sx=e.d.x*T+T/2-cam.x,sy=e.d.y*T+T/2-cam.y;if(sx>-40&&sx<cv.width+40)dNPC(cx,e.d,sx,sy)}
    else drawCat(cx,pl.x-cam.x,pl.y-cam.y,1.2,pl.dir);
  });

  // Particles
  mP.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=P.ink;cx.font=(11+p.life*5)+'px "Patrick Hand"';cx.textAlign='center';cx.fillText(p.t,p.x-cam.x,p.y-cam.y)});cx.globalAlpha=1;
  sP.forEach(p=>{cx.globalAlpha=p.life;cx.fillStyle=p.c;cx.beginPath();cx.arc(p.x-cam.x,p.y-cam.y,2*p.life,0,Math.PI*2);cx.fill()});cx.globalAlpha=1;

  if(pl.nap){cx.globalAlpha=Math.min(pl.napT*.7,.5);cx.fillStyle='#9878b8';cx.font='24px "Patrick Hand"';cx.textAlign='center';cx.fillText('z z z z',pl.x-cam.x,pl.y-cam.y-30-pl.napT*7);cx.globalAlpha=1}

  // "pixel" label under cat
  cx.fillStyle='rgba(42,42,42,.5)';cx.font='10px Quicksand';cx.textAlign='center';
  cx.fillText('pixel',pl.x-cam.x,pl.y-cam.y+22);

  dMM();
  requestAnimationFrame(loop);
}
</script>
</body>
